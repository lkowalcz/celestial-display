<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Celestial Display</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap');

  :root {
    --ink-bright: #E8ECF2;
    --ink-mid:    #9AA3AD;
    --ink-dim:    #565E68;
    --ice:        #7FB4D9;
    --amber:      #C9A26B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    cursor: default;
  }

  #stage { position: fixed; inset: 0; display: block; width: 100%; height: 100%; }

  /* ---------- caption ---------- */
  #caption {
    position: fixed;
    top: 28px; left: 32px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.6s ease;
  }
  #caption.visible { opacity: 1; }
  #caption .title {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.28em;
    color: var(--ink-mid);
    text-transform: uppercase;
  }
  #caption .detail {
    margin-top: 7px;
    font-size: 9px;
    font-weight: 300;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }

  /* ---------- controls (hover-revealed) ---------- */
  #controls {
    position: fixed;
    bottom: 26px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 18px;
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
  }
  #controls.visible { opacity: 1; pointer-events: auto; }

  #controls button {
    background: none;
    border: 1px solid rgba(154,163,173,0.25);
    color: var(--ink-mid);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.1em;
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.25s, color 0.25s;
  }
  #controls button:hover { border-color: var(--ink-mid); color: var(--ink-bright); }
  #controls button:focus-visible {
    outline: 1px solid var(--ice);
    outline-offset: 2px;
  }

  #dots { display: flex; gap: 10px; align-items: center; }
  #dots .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(154,163,173,0.3);
    transition: background 0.4s, transform 0.4s;
    cursor: pointer;
    border: none; padding: 0;
  }
  #dots .dot.active { background: var(--ink-bright); transform: scale(1.3); }
  #dots .dot:focus-visible { outline: 1px solid var(--ice); outline-offset: 3px; }

  @media (prefers-reduced-motion: reduce) {
    #caption { transition: opacity 0.3s ease; }
  }
</style>
</head>
<body>

<canvas id="stage" aria-label="Rotating astronomical visualization"></canvas>

<div id="caption" aria-live="polite">
  <div class="title"></div>
  <div class="detail"></div>
</div>

<div id="controls">
  <button id="prev" aria-label="Previous scene">‹</button>
  <div id="dots" role="tablist"></div>
  <button id="pause" aria-label="Pause">❚❚</button>
  <button id="next" aria-label="Next scene">›</button>
</div>

<script>
'use strict';

/* ============================================================
   Celestial Display — prototype
   Four scenes, crossfaded through black (OLED-friendly):
     1. Heliocentric — log-radial Keplerian orrery
     2. Local Sky — real-time horizon view
     3. Large-scale structure — SDSS redshift fan
     4. Planets — grand tour on real mission maps
   ============================================================ */

const TAU = Math.PI * 2;
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const MOTION = reduceMotion ? 0.12 : 1.0;

/* ---------- device config via URL params ----------
   One deployment, many displays. Examples:
     ?hold=1800                 wall display: 30 min per scene
     ?density=0.6&labels=off    small tablet: lighter field, pure art
     ?scene=1                   lock to a single scene (0-indexed)
   --------------------------------------------------- */
const params = new URLSearchParams(location.search);
const num = (k, d) => { const v = parseFloat(params.get(k)); return Number.isFinite(v) ? v : d; };

// default particle density scales with pixel count (tablet ≈ 0.5–0.7, 4K wall ≈ 1.5+)
const autoDensity = Math.max(0.35, Math.min(2.0,
  (window.innerWidth * window.innerHeight) / (1920 * 1080)));

const CONFIG = {
  view:    params.get('view') || 'ambient', // 'ambient': 3-scene rotation; 'tour': planet tour
  hold:    num('hold', 40),                 // seconds per scene
  fade:    num('fade', 2.6),                // crossfade duration
  density: num('density', autoDensity),     // particle-count multiplier
  labels:  params.get('labels') !== 'off',  // planet names + AU rings
  scene:   params.has('scene') ? Math.floor(num('scene', 0)) : null, // lock to one scene
  lat:      num('lat', 51.4779),            // observer latitude (deg, N+) — default Greenwich
  lon:      num('lon', 0),                  // observer longitude (deg, E+)
  callouts: Math.floor(num('callouts', 4)), // Local Sky: label the N closest bodies in frame
  planet:   params.get('planet'),           // Planets: starting planet (name or 0-7)
};

const SCENE_HOLD = CONFIG.hold;
const FADE = CONFIG.fade;
const D = CONFIG.density;

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ---------- shared helpers ---------- */
const rand = (a, b) => a + Math.random() * (b - a);
function gauss() { // Box–Muller
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(TAU * v);
}
const smooth = t => t * t * (3 - 2 * t);

/* Solve Kepler's equation M = E − e·sinE (Newton) */
function keplerE(M, e) {
  let E = e < 0.8 ? M : Math.PI;
  for (let i = 0; i < 6; i++) {
    E -= (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
  }
  return E;
}

/* ============================================================
   SCENE 1 — Heliocentric (log-radial orrery)
   ============================================================ */
const orrery = {
  title: 'Heliocentric',
  detail: 'Ephemeris · log-radial · 1 s = 1 day',

  // JPL Keplerian elements, mean ecliptic & equinox of J2000 (Standish).
  // Each element is [value at J2000, rate per Julian century].
  // Planets: Table 1 (valid 1800–2050 AD); Pluto: Table 2a, with its
  // extra b·T² term in mean anomaly. Ecliptic-plane projection (i, Ω
  // dropped): inclinations ≤ 7° except Pluto's 17°.
  // https://ssd.jpl.nasa.gov/planets/approx_pos.html
  planets: [
    { a: [ 0.38709927,  0.00000037], e: [0.20563593,  0.00001906], L: [ 252.25032350, 149472.67411175], w: [  77.45779628,  0.16047689], i: [7.00497902, -0.00594749], node: [ 48.33076593, -0.12534081], m0: -0.6, c: '#B8B2A8', s: 1.7, name: 'MERCURY' },
    { a: [ 0.72333566,  0.00000390], e: [0.00677672, -0.00004107], L: [ 181.97909950,  58517.81538729], w: [ 131.60246718,  0.00268329], i: [3.39467605, -0.00078890], node: [ 76.67984255, -0.27769418], m0: -4.5, c: '#E6D3A8', s: 2.4, name: 'VENUS'   },
    { a: [ 1.00000261,  0.00000562], e: [0.01671123, -0.00004392], L: [ 100.46457166,  35999.37244981], w: [ 102.93768193,  0.32327364], i: [-0.00001531, -0.01294668], node: [ 0.0, 0.0 ], m0: 0, c: '#7FB4D9', s: 2.5, name: 'EARTH'   },
    { a: [ 1.52371034,  0.00001847], e: [0.09339410,  0.00007882], L: [  -4.55343205,  19140.30268499], w: [ -23.94362959,  0.44441088], i: [1.84969142, -0.00813131], node: [ 49.55953891, -0.29257343], m0: -1.5, c: '#D08159', s: 2.0, name: 'MARS'    },
    { a: [ 5.20288700, -0.00011607], e: [0.04838624, -0.00013253], L: [  34.39644051,   3034.74612775], w: [  14.72847983,  0.21252668], i: [1.30439695, -0.00183714], node: [100.47390909,  0.20469106], m0: -9.4, c: '#D9B48A', s: 4.4, name: 'JUPITER' },
    { a: [ 9.53667594, -0.00125060], e: [0.05386179, -0.00050991], L: [  49.95424423,   1222.49362201], w: [  92.59887831, -0.41897216], i: [2.48599187,  0.00193609], node: [113.66242448, -0.28867794], m0: -8.9, c: '#E3CFA0', s: 3.8, name: 'SATURN'  },
    { a: [19.18916464, -0.00196176], e: [0.04725744, -0.00004397], L: [ 313.23810451,    428.48202785], w: [ 170.95427630,  0.40805281], i: [0.77263783, -0.00242939], node: [ 74.01692503,  0.04240589], m0: -7.2, c: '#9FD4D9', s: 3.0, name: 'URANUS'  },
    { a: [30.06992276,  0.00026291], e: [0.00859048,  0.00005105], L: [ -55.12002969,    218.45945325], w: [  44.96476227, -0.32241464], i: [1.77004347,  0.00035372], node: [131.78422574, -0.00508664], m0: -7.0, c: '#6E93D6', s: 3.0, name: 'NEPTUNE' },
    { a: [39.48686035,  0.00449751], e: [0.24885238,  0.00006016], L: [ 238.96535011,    145.18042903], w: [ 224.09702598, -0.00968827], i: [17.14104260, 0.00000501], node: [110.30167986, -0.00809981], b: -0.01262724, m0: -0.4, c: '#8E8880', s: 1.5, name: 'PLUTO', dashed: true },
  ],

  EARTH_PERIOD_S: 365.25,   // 1 s of display time = 1 day (Earth orbits in ~6 min)
  R_MIN_AU: 0.28, R_MAX_AU: 52,
  belt: null, trojans: null,

  // The scene is a clock: each showing sweeps a real-time window centered
  // on "now" — half past, half future. enter() anchors display time to the
  // wall clock at scene entry; draw() maps scene seconds to Julian dates.
  tAnchor: 0, jdAnchor: 0, _iso: null,

  enter(tClock) {
    this.tAnchor = tClock;
    this.jdAnchor = Date.now() / 86400000 + 2440587.5;   // current JD (UTC)
    this._iso = null;
  },

  /* osculating elements at T Julian centuries from J2000 → mean anomaly etc. */
  elements(pl, T) {
    const a = pl.a[0] + pl.a[1] * T;
    const e = pl.e[0] + pl.e[1] * T;
    const L = pl.L[0] + pl.L[1] * T;
    const w = pl.w[0] + pl.w[1] * T;
    let M = (L - w + (pl.b ? pl.b * T * T : 0)) * Math.PI / 180;
    M = ((M % TAU) + TAU) % TAU;
    return { a, e, M, wRad: w * Math.PI / 180 };
  },

  /* full 3D heliocentric ecliptic-J2000 position (AU) — used by Local Sky */
  helioEcl(pl, T) {
    const { a, e, M, wRad } = this.elements(pl, T);
    const iR = (pl.i[0] + pl.i[1] * T) * Math.PI / 180;
    const oR = (pl.node[0] + pl.node[1] * T) * Math.PI / 180;
    const wA = wRad - oR;                       // argument of perihelion
    const E = keplerE(M, e);
    const xp = a * (Math.cos(E) - e);
    const yp = a * Math.sqrt(1 - e * e) * Math.sin(E);
    const cw = Math.cos(wA), sw = Math.sin(wA);
    const co = Math.cos(oR), so = Math.sin(oR);
    const ci = Math.cos(iR), si = Math.sin(iR);
    return {
      x: (cw * co - sw * so * ci) * xp + (-sw * co - cw * so * ci) * yp,
      y: (cw * so + sw * co * ci) * xp + (-sw * so + cw * co * ci) * yp,
      z: sw * si * xp + cw * si * yp,
    };
  },

  init() {
    // --- main belt with Kirkwood gaps ---
    const gaps = [
      { a: 2.502, w: 0.048 },  // 3:1
      { a: 2.825, w: 0.032 },  // 5:2
      { a: 2.958, w: 0.026 },  // 7:3
      { a: 3.279, w: 0.042 },  // 2:1
    ];
    const belt = [];
    const beltCount = Math.round(1400 * D);
    while (belt.length < beltCount) {
      const a = rand(2.06, 3.30);
      if (gaps.some(g => Math.abs(a - g.a) < g.w)) continue;
      belt.push({
        a,
        phase: rand(0, TAU),
        n: TAU / (this.EARTH_PERIOD_S * Math.pow(a, 1.5)),  // Kepler III
        jitter: gauss() * 0.02,
        alpha: rand(0.10, 0.38),
      });
    }
    this.belt = belt;

    // --- Jupiter trojans (L4 / L5 clumps, co-orbital) ---
    const aJ = this.planets[4].a[0];
    const trojans = [];
    for (const sign of [1, -1]) {
      for (let i = 0; i < Math.round(130 * D); i++) {
        trojans.push({
          a: aJ * (1 + gauss() * 0.015),
          lead: sign * (Math.PI / 3 + gauss() * 0.16),
          alpha: rand(0.10, 0.32),
        });
      }
    }
    this.trojans = trojans;
  },

  Rmap(rAU, minDim) {
    const Rin = 0.055 * minDim, Rout = 0.465 * minDim;
    const f = Math.log(rAU / this.R_MIN_AU) / Math.log(this.R_MAX_AU / this.R_MIN_AU);
    return Rin + (Rout - Rin) * f;
  },

  draw(t) {
    const cx = W / 2, cy = H / 2, minDim = Math.min(W, H);
    const font = (px) => `${px}px 'IBM Plex Mono', monospace`;

    // display epoch: window of ±(hold/2) days centered on "now" at mid-hold
    const DAYS_PER_SEC = 365.25 / this.EARTH_PERIOD_S;
    const jd = this.jdAnchor
      + (t - this.tAnchor - (FADE + SCENE_HOLD / 2)) * DAYS_PER_SEC * MOTION;
    const T = (jd - 2451545.0) / 36525;   // Julian centuries from J2000

    // caption date readout — the clock hand
    const iso = new Date((jd - 2440587.5) * 86400000).toISOString().slice(0, 10);
    if (iso !== this._iso) {
      this._iso = iso;
      detailEl.textContent = `${iso} · log-radial · 1 s = 1 day`;
    }

    // --- AU reference rings ---
    if (CONFIG.labels) {
      ctx.save();
      ctx.setLineDash([1, 5]);
      ctx.lineWidth = 1;
      for (const au of [1, 10]) {
        const R = this.Rmap(au, minDim);
        ctx.strokeStyle = 'rgba(86,94,104,0.30)';
        ctx.beginPath(); ctx.arc(cx, cy, R, 0, TAU); ctx.stroke();
        ctx.fillStyle = 'rgba(86,94,104,0.65)';
        ctx.font = font(8.5);
        ctx.fillText(`${au} AU`, cx + R * 0.7071 + 6, cy - R * 0.7071 - 6);
      }
      ctx.restore();
    }

    // --- Sun ---
    let g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 30);
    g.addColorStop(0, 'rgba(255,244,224,0.95)');
    g.addColorStop(0.12, 'rgba(240,205,150,0.55)');
    g.addColorStop(0.5, 'rgba(201,162,107,0.10)');
    g.addColorStop(1, 'rgba(201,162,107,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, 30, 0, TAU); ctx.fill();

    // --- asteroid belt ---
    ctx.fillStyle = '#8B8578';
    for (const p of this.belt) {
      const th = p.phase + p.n * t * MOTION;
      const R = this.Rmap(p.a, minDim) + p.jitter * minDim;
      ctx.globalAlpha = p.alpha;
      ctx.fillRect(cx + R * Math.cos(th) - 0.5, cy - R * Math.sin(th) - 0.5, 1, 1);
    }

    // --- trojans (referenced to Jupiter's current mean longitude) ---
    const jup = this.planets[4];
    const Ljup = ((jup.L[0] + jup.L[1] * T) * Math.PI / 180) % TAU;
    ctx.fillStyle = '#9A8F7C';
    for (const p of this.trojans) {
      const th = Ljup + p.lead;
      const R = this.Rmap(p.a, minDim);
      ctx.globalAlpha = p.alpha;
      ctx.fillRect(cx + R * Math.cos(th) - 0.5, cy - R * Math.sin(th) - 0.5, 1, 1);
    }
    ctx.globalAlpha = 1;

    // --- orbits & planets ---
    for (const pl of this.planets) {
      const { a, e, M, wRad } = this.elements(pl, T);

      // orbit path: r(ν) = a(1−e²)/(1+e·cosν), log-mapped
      ctx.beginPath();
      const steps = 180;
      for (let s = 0; s <= steps; s++) {
        const nu = (s / steps) * TAU;
        const r = a * (1 - e * e) / (1 + e * Math.cos(nu));
        const R = this.Rmap(r, minDim);
        const th = nu + wRad;
        const x = cx + R * Math.cos(th), y = cy - R * Math.sin(th);
        s === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.lineWidth = 1;
      if (pl.dashed) ctx.setLineDash([2, 6]);
      ctx.strokeStyle = `rgba(127,180,217,${pl.dashed ? 0.10 : 0.17})`;
      ctx.stroke();
      ctx.setLineDash([]);

      // true position at the display epoch via Kepler's equation
      const E = keplerE(M, e);
      const nu = 2 * Math.atan2(
        Math.sqrt(1 + e) * Math.sin(E / 2),
        Math.sqrt(1 - e) * Math.cos(E / 2)
      );
      const r = a * (1 - e * Math.cos(E));
      const R = this.Rmap(r, minDim);
      const th = nu + wRad;
      const x = cx + R * Math.cos(th), y = cy - R * Math.sin(th);

      // glow + core
      g = ctx.createRadialGradient(x, y, 0, x, y, pl.s * 5);
      g.addColorStop(0, pl.c + 'AA');
      g.addColorStop(1, pl.c + '00');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(x, y, pl.s * 5, 0, TAU); ctx.fill();
      ctx.fillStyle = pl.c;
      ctx.beginPath(); ctx.arc(x, y, pl.s, 0, TAU); ctx.fill();

      // Saturn's ring hint
      if (pl.name === 'SATURN') {
        ctx.save();
        ctx.translate(x, y); ctx.rotate(-0.35);
        ctx.strokeStyle = pl.c + '66';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.ellipse(0, 0, pl.s * 2.4, pl.s * 0.9, 0, 0, TAU); ctx.stroke();
        ctx.restore();
      }

      // label
      if (CONFIG.labels) {
        ctx.fillStyle = 'rgba(154,163,173,0.42)';
        ctx.font = font(8.5);
        ctx.fillText(pl.name, x + pl.s + 6, y - pl.s - 4);
      }
    }
  },
};

/* ============================================================
   Gaia DR3 star catalog (shared by the Local Sky scene)
   Loads data/gaia_stars.bin async; synthesizes a comparable
   field when the fetch fails (offline, file://) so dependent
   scenes always have a sky — captioned honestly either way.
   ============================================================ */
const gaiaCatalog = {
  data: null,   // { source, bright: [{ra,dec,m,bk}], nf, fRa, fDec, fAlpha, fBucket, sprites }
  BRIGHT_CUT: 6.0,       // stars brighter than this get live sprite treatment

  /* BP−RP color index → approximate blackbody star color, slightly
     desaturated toward the display's star white. */
  bprpColor(c) {
    const stops = [
      [-0.5, [158, 178, 244]],   // O/B
      [ 0.1, [186, 202, 244]],
      [ 0.5, [225, 231, 242]],   // A/F — house star white
      [ 0.9, [242, 238, 220]],   // G
      [ 1.5, [240, 216, 176]],   // K
      [ 2.3, [232, 186, 138]],   // early M
      [ 3.4, [222, 158, 110]],   // M
    ];
    let i = 0;
    while (i < stops.length - 2 && c > stops[i + 1][0]) i++;
    const [c0, rgb0] = stops[i], [c1, rgb1] = stops[i + 1];
    const f = Math.max(0, Math.min(1, (c - c0) / (c1 - c0)));
    return rgb0.map((v, k) => Math.round(v + (rgb1[k] - v) * f));
  },

  makeSprites(bucketRGB) {
    return bucketRGB.map(rgb => {
      const c = document.createElement('canvas');
      c.width = c.height = 64;
      const g2 = c.getContext('2d');
      const grad = g2.createRadialGradient(32, 32, 0, 32, 32, 32);
      grad.addColorStop(0, '#FFFFFF');
      grad.addColorStop(0.10, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.9)`);
      grad.addColorStop(0.32, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.22)`);
      grad.addColorStop(1, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
      g2.fillStyle = grad;
      g2.fillRect(0, 0, 64, 64);
      return c;
    });
  },

  bucketRGBs() {
    const NB = 24, out = [];
    for (let b = 0; b < NB; b++) out.push(this.bprpColor(-0.6 + (b + 0.5) * 4.6 / NB));
    return out;
  },

  async load() {
    try {
      const res = await fetch('data/gaia_stars.bin');
      if (!res.ok) { this.synthesize(); return; }
      const buf = await res.arrayBuffer();
      const dv = new DataView(buf);
      if (dv.getUint32(0, true) !== 0x47414941) { this.synthesize(); return; }   // "GAIA"
      const n = dv.getUint32(4, true);
      const u = new Uint16Array(buf, 8, n * 4);

      // galactic → ICRS rotation (transpose of the standard ICRS→galactic matrix)
      const R = [
        -0.0548755604,  0.4941094279, -0.8676661490,
        -0.8734370902, -0.4448296300, -0.1980763734,
        -0.4838350155,  0.7469822445,  0.4559837762,
      ];

      const NB = 24;                       // quantized color buckets
      const bucketRGB = this.bucketRGBs();

      const bright = [];
      const fRa = new Float32Array(n), fDec = new Float32Array(n);
      const fAlpha = new Float32Array(n), fBucket = new Uint8Array(n);
      let nf = 0;
      for (let i = 0; i < n; i++) {
        const l   = u[i * 4]     / 65535 * TAU;
        const b   = u[i * 4 + 1] / 65535 * Math.PI - Math.PI / 2;
        const mag = u[i * 4 + 2] / 65535 * 14 - 2;          // [-2, 12]
        const col = u[i * 4 + 3] / 65535 * 4.6 - 0.6;       // [-0.6, 4.0]
        const cb = Math.cos(b);
        const xg = cb * Math.cos(l), yg = cb * Math.sin(l), zg = Math.sin(b);
        const x = R[0] * xg + R[1] * yg + R[2] * zg;
        const y = R[3] * xg + R[4] * yg + R[5] * zg;
        const z = R[6] * xg + R[7] * yg + R[8] * zg;
        const ra = Math.atan2(y, x), dec = Math.asin(Math.max(-1, Math.min(1, z)));
        const bucket = Math.max(0, Math.min(NB - 1, Math.floor((col + 0.6) / 4.6 * NB)));
        if (mag < this.BRIGHT_CUT) {
          bright.push({ ra, dec, m: mag, bk: bucket, tw: rand(0, TAU), tws: rand(0.3, 1.4) });
        } else {
          fRa[nf] = ra; fDec[nf] = dec; fBucket[nf] = bucket;
          fAlpha[nf] = Math.min(0.85, 1.9 * Math.pow(10, -0.4 * (mag - this.BRIGHT_CUT)));
          nf++;
        }
      }
      bright.sort((a, b) => a.m - b.m);

      this.data = {
        source: 'Gaia DR3', bright, nf, fRa, fDec, fAlpha, fBucket,
        sprites: this.makeSprites(bucketRGB),
      };
    } catch (e) {
      console.warn('gaia load failed, synthesizing fallback field:', e);
      this.synthesize();
    }
  },

  /* offline fallback: statistically plausible field, same data shape */
  synthesize() {
    const TILT = 1.05;   // stand-in galactic-plane tilt
    const toEq = (l, b) => {
      const x = Math.cos(b) * Math.cos(l);
      const y = Math.cos(b) * Math.sin(l);
      const z = Math.sin(b);
      const y2 = y * Math.cos(TILT) - z * Math.sin(TILT);
      const z2 = y * Math.sin(TILT) + z * Math.cos(TILT);
      return { ra: Math.atan2(y2, x), dec: Math.asin(Math.max(-1, Math.min(1, z2))) };
    };
    const NB = 24;
    const pickBk = () => Math.min(NB - 1, Math.floor(Math.pow(Math.random(), 0.7) * NB));
    const bright = [];
    const NF = Math.round(24000 * D);
    const fRa = new Float32Array(NF), fDec = new Float32Array(NF);
    const fAlpha = new Float32Array(NF), fBucket = new Uint8Array(NF);
    for (let i = 0; i < 900; i++) {
      const l = rand(0, TAU), b = Math.asin(rand(-1, 1));
      const { ra, dec } = toEq(l, b);
      bright.push({ ra, dec, m: 6 - Math.pow(Math.random(), 2.2) * 6, bk: pickBk() });
    }
    bright.sort((a, b) => a.m - b.m);
    for (let i = 0; i < NF; i++) {
      const band = Math.random() < 0.6;
      const l = rand(0, TAU), b = band ? gauss() * 0.13 : Math.asin(rand(-1, 1));
      const { ra, dec } = toEq(l, b);
      fRa[i] = ra; fDec[i] = dec; fBucket[i] = pickBk();
      fAlpha[i] = 0.08 + Math.pow(Math.random(), 2.5) * 0.7;
    }
    this.data = {
      source: 'synthetic', bright, nf: NF, fRa, fDec, fAlpha, fBucket,
      sprites: this.makeSprites(this.bucketRGBs()),
    };
  },
};
gaiaCatalog.load();

    },
  },
  decoded: {}, pending: {}, blobs: {}, _touch: 0,

  /* kick off (or re-kick) load of one map; safe to call every frame */
  request(key) {
    if (this.decoded[key] || this.pending[key]) return;
    this.pending[key] = true;
    this._load(key).catch(e => {
      console.warn(`planet map ${key} failed, synthesizing:`, e);
      this._store(key, this.synthesize(key));
    });
  },

  async _load(key) {
    const reg = this.registry[key];
    const grab = async (file) => {
      if (!this.blobs[file]) {                  // fetched once, kept compressed
        const res = await fetch(`data/planets/${file}`);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        this.blobs[file] = await res.blob();
      }
      const bmp = await createImageBitmap(this.blobs[file]);
      const c = document.createElement('canvas');
      c.width = bmp.width; c.height = bmp.height;
      const g2 = c.getContext('2d', { willReadFrequently: true });
      g2.drawImage(bmp, 0, 0);
      return { w: bmp.width, h: bmp.height,
               data: g2.getImageData(0, 0, bmp.width, bmp.height).data };
    };
    const day = await grab(reg.file);
    const entry = { source: reg.source, synthetic: false,
                    w: day.w, h: day.h, data: day.data };
    if (reg.night) {
      const nt = await grab(reg.night);
      if (nt.w === day.w && nt.h === day.h) entry.night = nt.data;
    }
    if (reg.ringProfile) {
      try { entry.ringProfile = await grab(reg.ringProfile); }
      catch (e) { console.warn('ring profile failed:', e); }
    }
    this._store(key, entry);
  },

  _store(key, entry) {
    entry.lastUse = ++this._touch;
    this.decoded[key] = entry;
    delete this.pending[key];
    const keys = Object.keys(this.decoded);
    if (keys.length > 3) {                       // ~26 MB RGBA each
      keys.sort((a, b) => this.decoded[a].lastUse - this.decoded[b].lastUse);
      delete this.decoded[keys[0]];              // re-decoded from blob if revisited
    }
  },

  peek(key) {
    const e = this.decoded[key];
    if (e) e.lastUse = ++this._touch;
    return e || null;
  },

  /* offline fallback: banded map at roughly real zonal-band latitudes;
     clearly captioned as synthetic */
  synthesize(key) {
    const reg = this.registry[key], sy = reg.synth;
    const w = 1024, h = 512, data = new Uint8ClampedArray(w * h * 4);
    const fr = sy.freq;
    const noise = (u, lat) =>
      Math.sin(u * TAU * fr + lat * 0.23 + Math.sin(u * TAU * (fr * 2 + 1) + lat * 0.11) * 1.3) * 0.6 +
      Math.sin(u * TAU * (fr * 3 + 2) + lat * 0.07 + 2.1) * 0.4;
    for (let py = 0; py < h; py++) {
      const lat = 90 - (py + 0.5) / h * 180;
      let i = 0;
      while (i < sy.stops.length - 2 && lat < sy.stops[i + 1][0]) i++;
      const [l0, ...c0] = sy.stops[i], [l1, ...c1] = sy.stops[i + 1];
      const f = smooth(Math.max(0, Math.min(1, (l0 - lat) / (l0 - l1 || 1))));
      for (let px = 0; px < w; px++) {
        const u = px / w;
        const n = 1 + sy.amp * noise(u, lat) + sy.amp * 0.5 * noise(u * 5.31, lat * 2.7);
        let r = (c0[0] + (c1[0] - c0[0]) * f) * n;
        let g = (c0[1] + (c1[1] - c0[1]) * f) * n;
        let b = (c0[2] + (c1[2] - c0[2]) * f) * n;
        if (reg.oval) {   // signature feature stand-in at its real spot
          const [ou, olat, orx, ory, or_, og, ob] = reg.oval;
          let dl = ((u - ou) % 1 + 1) % 1; if (dl > 0.5) dl -= 1;
          const e2 = (dl * 360 / orx) ** 2 + ((lat - olat) / ory) ** 2;
          if (e2 < 1) {
            const m = smooth(1 - e2);
            r += (or_ - r) * m; g += (og - g) * m; b += (ob - b) * m;
          }
        }
        const o = (py * w + px) * 4;
        data[o] = r; data[o + 1] = g; data[o + 2] = b; data[o + 3] = 255;
      }
    }
    return { source: 'synthetic bands', synthetic: true, w, h, data };
  },
};

/* ============================================================
   SCENE 2 — Local Sky (real-time horizon view)
   The window, not the map: a perspective camera standing at
   CONFIG.lat/lon, showing the stars as they stand over that spot
   RIGHT NOW (true sidereal time from the wall clock), slowly
   panning around the horizon. Pause freezes the pan; the sky
   itself always runs on real time. Stars from gaiaCatalog; Sun,
   Moon, and planets from the orrery's ephemeris + lunar theory.
   ============================================================ */
const localSky = {
  title: 'Local Sky',
  detail: 'Real-time horizon · awaiting catalog',
  FOV_H: 62 * Math.PI / 180,   // horizontal field of view
  PAN_S: 540,                  // seconds per full look-around (× 1/MOTION)
  built: null, builtFrom: null, _cap: '',

  /* one-time: ICRS unit vectors + coarse sky bins for FOV culling */
  build() {
    const g = gaiaCatalog.data;
    if (!g) return;
    const nb = g.bright.length;
    const n = nb + g.nf;
    const ra = new Float32Array(n), dec = new Float32Array(n);
    const alpha = new Float32Array(n), mag = new Float32Array(n);
    const bk = new Uint8Array(n);
    g.bright.forEach((s, i) => {
      ra[i] = s.ra; dec[i] = s.dec; mag[i] = s.m; bk[i] = s.bk;
      alpha[i] = Math.min(1, 0.30 + (gaiaCatalog.BRIGHT_CUT - s.m) * 0.13);
    });
    for (let i = 0; i < g.nf; i++) {
      ra[nb + i] = g.fRa[i]; dec[nb + i] = g.fDec[i];
      mag[nb + i] = 8; alpha[nb + i] = g.fAlpha[i] * 0.8;
    }
    this.builtFrom = g.source;

    const vx = new Float32Array(n), vy = new Float32Array(n), vz = new Float32Array(n);
    for (let i = 0; i < n; i++) {
      const cd = Math.cos(dec[i]);
      vx[i] = cd * Math.cos(ra[i]); vy[i] = cd * Math.sin(ra[i]); vz[i] = Math.sin(dec[i]);
    }
    // 24 × 12 sky bins (15° cells) for per-frame FOV culling
    const NRA = 24, NDEC = 12, nb2 = NRA * NDEC;
    const counts = new Uint32Array(nb2);
    const binOf = new Uint16Array(n);
    for (let i = 0; i < n; i++) {
      const bra = Math.min(NRA - 1, Math.floor(((ra[i] / TAU) % 1 + 1) % 1 * NRA));
      const bdec = Math.min(NDEC - 1, Math.floor((dec[i] / Math.PI + 0.5) * NDEC));
      binOf[i] = bdec * NRA + bra; counts[binOf[i]]++;
    }
    const starts = new Uint32Array(nb2 + 1);
    for (let b = 0; b < nb2; b++) starts[b + 1] = starts[b] + counts[b];
    const order = new Uint32Array(n);
    const cursor = starts.slice(0, nb2);
    for (let i = 0; i < n; i++) order[cursor[binOf[i]]++] = i;
    // bin center unit vectors
    const bcx = new Float32Array(nb2), bcy = new Float32Array(nb2), bcz = new Float32Array(nb2);
    for (let bd = 0; bd < NDEC; bd++) for (let br = 0; br < NRA; br++) {
      const b = bd * NRA + br;
      const cra = (br + 0.5) / NRA * TAU, cdec = ((bd + 0.5) / NDEC - 0.5) * Math.PI;
      const cd = Math.cos(cdec);
      bcx[b] = cd * Math.cos(cra); bcy[b] = cd * Math.sin(cra); bcz[b] = Math.sin(cdec);
    }
    this.built = { n, vx, vy, vz, alpha, mag, bk, starts, order, bcx, bcy, bcz, nb2 };
  },

  init() {},
  onResize() {},

  /* Sun, Moon, and naked-eye planets as geocentric ICRS unit vectors.
     Planets: orrery's JPL elements minus Earth's position. Moon: the
     Astronomical Almanac low-precision series (~0.3°), topocentric via
     the observer's up vector. Pluto omitted: at mag ~14 it is fainter
     than the G<10 catalog floor and would be dishonest as a dot. */
  solarBodies(T, Ux, Uy, Uz) {
    const DEG = Math.PI / 180;
    const ce = Math.cos(23.43928 * DEG), se = Math.sin(23.43928 * DEG);
    const eq = (x, y, z) => [x, y * ce - z * se, y * se + z * ce];
    const earth = orrery.helioEcl(orrery.planets[2], T);
    const out = [];
    const push = (name, v, dist, extra) => out.push(Object.assign({
      name, ux: v[0] / dist, uy: v[1] / dist, uz: v[2] / dist, dist,
    }, extra));

    { // Sun (geocentric = −Earth heliocentric)
      const v = eq(-earth.x, -earth.y, -earth.z);
      push('SUN', v, Math.hypot(v[0], v[1], v[2]), { kind: 'sun' });
    }
    for (const [idx, pl] of orrery.planets.entries()) {
      if (idx === 2 || idx === 8) continue;        // Earth, Pluto
      const h = orrery.helioEcl(pl, T);
      const v = eq(h.x - earth.x, h.y - earth.y, h.z - earth.z);
      const dg = Math.hypot(v[0], v[1], v[2]);
      const dh = Math.hypot(h.x, h.y, h.z);
      push(pl.name, v, dg, { kind: 'planet', color: pl.c,
        mag: pl.m0 + 5 * Math.log10(dh * dg) });
    }
    { // Moon
      const S = (a, b) => Math.sin((a + b * T) * DEG);
      const C = (a, b) => Math.cos((a + b * T) * DEG);
      const lam = (218.32 + 481267.883 * T
        + 6.29 * S(134.9, 477198.85) - 1.27 * S(259.2, -413335.38)
        + 0.66 * S(235.7, 890534.23) + 0.21 * S(269.9, 954397.70)
        - 0.19 * S(357.5, 35999.05) - 0.11 * S(186.6, 966404.05)) * DEG;
      const bet = (5.13 * S(93.3, 483202.03) + 0.28 * S(228.2, 960400.87)
        - 0.28 * S(318.3, 6003.18) - 0.17 * S(217.6, -407332.20)) * DEG;
      const par = (0.9508
        + 0.0518 * C(134.9, 477198.85) + 0.0095 * C(259.2, -413335.38)
        + 0.0078 * C(235.7, 890534.23) + 0.0028 * C(269.9, 954397.70)) * DEG;
      const distKm = 6378.14 / Math.sin(par);
      const cb = Math.cos(bet);
      const v = eq(cb * Math.cos(lam), cb * Math.sin(lam), Math.sin(bet));
      // topocentric: subtract the observer's geocentric position
      const vx = v[0] * distKm - 6378.14 * Ux;
      const vy = v[1] * distKm - 6378.14 * Uy;
      const vz = v[2] * distKm - 6378.14 * Uz;
      const dKm = Math.hypot(vx, vy, vz);
      push('MOON', [vx, vy, vz], dKm, { kind: 'moon', distKm: dKm });
      out[out.length - 1].dist = dKm / 149597870.7;      // AU, for ranking
    }
    return out;
  },

  draw(t) {
    if (!this.built || this.builtFrom !== gaiaCatalog.data?.source) this.build();
    if (!this.built) return;
    const B = this.built;

    // --- true sidereal time from the wall clock (the scene IS a clock) ---
    const d = Date.now() / 86400000 + 2440587.5 - 2451545.0;
    const gmst = (280.46061837 + 360.98564736629 * d) % 360;
    const lst = ((gmst + CONFIG.lon) % 360) * Math.PI / 180;
    const phi = CONFIG.lat * Math.PI / 180;

    // horizontal-frame basis vectors in equatorial coordinates
    const cl = Math.cos(lst), sl = Math.sin(lst), cp = Math.cos(phi), sp = Math.sin(phi);
    const Ux = cp * cl, Uy = cp * sl, Uz = sp;              // up
    const Nx = -sp * cl, Ny = -sp * sl, Nz = cp;            // north
    const Ex = -sl, Ey = cl, Ez = 0;                        // east

    // --- camera: slow pan in azimuth, gentle nod in altitude ---
    const azc = (t * TAU / this.PAN_S * MOTION) % TAU;
    const altc = 0.66 + 0.10 * Math.sin(t * 0.009 * MOTION);   // ~38° ± 6°
    const ca = Math.cos(azc), sa = Math.sin(azc), ch = Math.cos(altc), sh = Math.sin(altc);
    const hx = Nx * ca + Ex * sa, hy = Ny * ca + Ey * sa, hz = Nz * ca + Ez * sa;
    const Fx = hx * ch + Ux * sh, Fy = hy * ch + Uy * sh, Fz = hz * ch + Uz * sh;  // forward
    const Rx = -Nx * sa + Ex * ca, Ry = -Ny * sa + Ey * ca, Rz = -Nz * sa + Ez * ca; // right
    const Cx = Ux * ch - hx * sh, Cy = Uy * ch - hy * sh, Cz = Uz * ch - hz * sh;  // cam up

    const f = (W / 2) / Math.tan(this.FOV_H / 2);
    const halfDiag = Math.atan(Math.hypot(W, H) / 2 / f);
    const cosCull = Math.cos(halfDiag + 0.24);   // FOV half-diagonal + bin radius
    const minvz = Math.cos(halfDiag + 0.06);
    const cx = W / 2, cy = H / 2;
    const sprites = gaiaCatalog.data.sprites;
    const magLim = D >= 1 ? 99 : 8.2 + 1.8 * D;   // density trims only the faintest

    // faint stars colorless by design: scotopic vision sees no color there
    ctx.fillStyle = '#C9D2DC';
    for (let b = 0; b < B.nb2; b++) {
      if (B.bcx[b] * Fx + B.bcy[b] * Fy + B.bcz[b] * Fz < cosCull) continue;
      for (let k = B.starts[b]; k < B.starts[b + 1]; k++) {
        const i = B.order[k];
        const x = B.vx[i], y = B.vy[i], z = B.vz[i];
        const vz2 = x * Fx + y * Fy + z * Fz;
        if (vz2 < minvz) continue;
        const sinAlt = x * Ux + y * Uy + z * Uz;
        if (sinAlt < 0) continue;                       // below the horizon
        if (B.mag[i] > magLim) continue;
        const px = cx + (x * Rx + y * Ry + z * Rz) / vz2 * f;
        const py = cy - (x * Cx + y * Cy + z * Cz) / vz2 * f;
        if (px < -8 || px > W + 8 || py < -8 || py > H + 8) continue;
        const ext = sinAlt > 0.17 ? 1 : sinAlt / 0.17;  // atmospheric extinction < ~10° alt
        if (B.mag[i] < 6) {
          const twinkle = reduceMotion ? 1 : 0.85 + 0.15 * Math.sin(t * 1.1 + i);
          const s = (0.9 + (6 - B.mag[i]) * 0.5) * 4;
          ctx.globalAlpha = B.alpha[i] * ext * twinkle;
          ctx.drawImage(sprites[B.bk[i]], px - s, py - s, s * 2, s * 2);
        } else {
          ctx.globalAlpha = B.alpha[i] * ext;
          ctx.fillRect(px, py, 1.2, 1.2);
        }
      }
    }
    ctx.globalAlpha = 1;

    /* --- solar system: Sun, Moon, planets from the same ephemeris clock.
           Planets don't twinkle (they really don't). --- */
    const bodies = this.solarBodies(d / 36525, Ux, Uy, Uz);
    const inview = [];
    for (const b of bodies) {
      const vz2 = b.ux * Fx + b.uy * Fy + b.uz * Fz;
      if (vz2 < minvz) continue;
      const sinAlt = b.ux * Ux + b.uy * Uy + b.uz * Uz;
      if (sinAlt < 0) continue;
      const px = cx + (b.ux * Rx + b.uy * Ry + b.uz * Rz) / vz2 * f;
      const py = cy - (b.ux * Cx + b.uy * Cy + b.uz * Cz) / vz2 * f;
      if (px < -30 || px > W + 30 || py < -30 || py > H + 30) continue;
      const ext = sinAlt > 0.17 ? 1 : sinAlt / 0.17;
      inview.push(Object.assign({ px, py, ext }, b));
    }
    const sun = bodies[0];
    for (const b of inview) {
      if (b.kind === 'planet') {
        const size = Math.min(5, Math.max(1.1, 0.9 + (5.5 - b.mag) * 0.42));
        const g = ctx.createRadialGradient(b.px, b.py, 0, b.px, b.py, size * 4.5);
        g.addColorStop(0, b.color + 'CC');
        g.addColorStop(0.25, b.color + '55');
        g.addColorStop(1, b.color + '00');
        ctx.globalAlpha = b.ext;
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(b.px, b.py, size * 4.5, 0, TAU); ctx.fill();
        ctx.fillStyle = b.color;
        ctx.beginPath(); ctx.arc(b.px, b.py, size * 0.8, 0, TAU); ctx.fill();
      } else if (b.kind === 'sun') {
        const rpx = 0.00465 / b.dist * f;                 // true angular radius
        const g = ctx.createRadialGradient(b.px, b.py, 0, b.px, b.py, rpx * 6);
        g.addColorStop(0, 'rgba(255,246,228,0.95)');
        g.addColorStop(0.18, 'rgba(240,214,160,0.5)');
        g.addColorStop(1, 'rgba(232,217,176,0)');
        ctx.globalAlpha = b.ext;
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(b.px, b.py, rpx * 6, 0, TAU); ctx.fill();
      } else {                                            // moon, with true phase
        const rpx = Math.max(2.5, 1737 / b.distKm * f);   // true angular radius
        // bright-limb direction: sunward component ⊥ to the moon's direction
        let pxs = sun.ux - (sun.ux * b.ux + sun.uy * b.uy + sun.uz * b.uz) * b.ux;
        let pys = sun.uy - (sun.ux * b.ux + sun.uy * b.uy + sun.uz * b.uz) * b.uy;
        let pzs = sun.uz - (sun.ux * b.ux + sun.uy * b.uy + sun.uz * b.uz) * b.uz;
        const chi = Math.atan2(-(pxs * Cx + pys * Cy + pzs * Cz),
                                 pxs * Rx + pys * Ry + pzs * Rz);
        const cosE = sun.ux * b.ux + sun.uy * b.uy + sun.uz * b.uz;
        const k = (1 - cosE) / 2;                         // illuminated fraction
        const w2 = 2 * k - 1;
        ctx.save();
        ctx.translate(b.px, b.py);
        ctx.rotate(chi);
        ctx.globalAlpha = 0.5 * b.ext;                    // earthshine hint
        ctx.fillStyle = '#14171B';
        ctx.beginPath(); ctx.arc(0, 0, rpx, 0, TAU); ctx.fill();
        ctx.globalAlpha = b.ext;
        ctx.fillStyle = '#D8DCE2';
        ctx.beginPath();
        ctx.arc(0, 0, rpx, -Math.PI / 2, Math.PI / 2);
        // terminator: left half-ellipse (cw) adds for gibbous; right
        // half-ellipse (ccw) cancels the limb's winding for crescent
        ctx.ellipse(0, 0, rpx * Math.abs(w2), rpx, 0, Math.PI / 2, -Math.PI / 2, w2 < 0);
        ctx.fill();
        ctx.restore();
      }
    }
    // callouts: only the closest few bodies in frame, quietly labeled
    if (CONFIG.labels && inview.length) {
      inview.sort((a, b2) => a.dist - b2.dist);
      ctx.font = "8.5px 'IBM Plex Mono', monospace";
      ctx.fillStyle = 'rgba(154,163,173,0.5)';
      for (const b of inview.slice(0, CONFIG.callouts)) {
        const off = b.kind === 'moon' ? Math.max(2.5, 1737 / b.distKm * f) : 12;
        const dtxt = b.kind === 'moon'
          ? `${Math.round(b.distKm / 100) / 10}K KM`
          : `${b.dist.toFixed(2)} AU`;
        ctx.globalAlpha = b.ext;
        ctx.fillText(`${b.name} · ${dtxt}`, b.px + off + 5, b.py - off - 4);
      }
    }
    ctx.globalAlpha = 1;

    // caption: coordinates, sidereal time, viewing azimuth — the dials
    const lstH = ((gmst + CONFIG.lon) % 360 + 360) % 360 / 15;
    const hh = String(Math.floor(lstH)).padStart(2, '0');
    const mm = String(Math.floor((lstH % 1) * 60)).padStart(2, '0');
    const azd = Math.round(azc * 180 / Math.PI / 5) * 5 % 360;
    const cap = `${Math.abs(CONFIG.lat).toFixed(1)}°${CONFIG.lat >= 0 ? 'N' : 'S'} ${Math.abs(CONFIG.lon).toFixed(1)}°${CONFIG.lon >= 0 ? 'E' : 'W'} · LST ${hh}:${mm} · az ${azd}° · ${this.builtFrom}`;
    if (cap !== this._cap) {
      this._cap = cap;
      if (scenes[current] === this) detailEl.textContent = cap;
    }
  },
};

/* ============================================================
   SCENE 3 — Large-scale structure (SDSS redshift fan)
   ============================================================ */
const cosmicWeb = {
  title: 'Large-Scale Structure',
  detail: 'Synthetic cosmic web · nodes, filaments, voids',
  pts: null,

  /* --- SDSS DR18 redshift fan (loaded async from data/sdss_galaxies.bin;
         synthetic web below stays as the offline fallback) ---
     Real spectroscopic galaxies plotted survey-style: RA → angle,
     comoving distance → radius, one declination slice at a time,
     slowly precessing through slices. */
  sdss: null,
  Z_MAX: 0.25,           // must match scripts/sdss_preprocess.py
  RA_CENTER: 190,        // northern contiguous footprint points "up"
  SLICE_HOLD: 36,        // seconds per declination slice
  SLICE_FADE: 5,         // crossfade between slices
  _texA: null, _texB: null,

  /* comoving distance LUT, flat ΛCDM (H0 = 70, Ωm = 0.3), normalized
     to D_C(Z_MAX); the raw stored quantity is the measured redshift */
  buildDcLUT() {
    const N = 256, SUB = 4, lut = new Float32Array(N + 1);
    const dz = this.Z_MAX / (N * SUB);
    let acc = 0;
    for (let i = 1; i <= N; i++) {
      for (let k = 0; k < SUB; k++) {
        const z = ((i - 1) * SUB + k + 0.5) * dz;
        acc += dz / Math.sqrt(0.3 * (1 + z) ** 3 + 0.7);
      }
      lut[i] = acc;
    }
    for (let i = 0; i <= N; i++) lut[i] /= lut[N];
    return lut;
  },

  async loadSDSS() {
    try {
      const res = await fetch('data/sdss_galaxies.bin');
      if (!res.ok) return;
      const buf = await res.arrayBuffer();
      const dv = new DataView(buf);
      if (dv.getUint32(0, true) !== 0x53445353) return;   // "SDSS"
      const n = dv.getUint32(4, true);
      const u = new Uint16Array(buf, 8, n * 3);

      const lut = this.buildDcLUT(), NL = 256;
      const th = new Float32Array(n), r = new Float32Array(n);
      const sliceOf = new Uint8Array(n).fill(255);
      const counts = new Uint32Array(20);
      for (let i = 0; i < n; i++) {
        const ra = u[i * 3] / 65535 * 360;
        const dec = u[i * 3 + 1] / 65535 * 180 - 90;
        const zf = u[i * 3 + 2] / 65535;                  // z / Z_MAX
        const dth = ((ra - this.RA_CENTER + 540) % 360) - 180;
        th[i] = dth * Math.PI / 180;
        const fi = zf * NL, i0 = Math.min(NL - 1, Math.floor(fi));
        r[i] = lut[i0] + (lut[i0 + 1] - lut[i0]) * (fi - i0);
        // 4°-wide declination bins centered at −2, 2, 6, … 74
        const k = Math.floor((dec + 4) / 4);
        if (k >= 0 && k < 20 && Math.abs(th[i]) < 1.75) {
          sliceOf[i] = k; counts[k]++;
        }
      }
      const order = [];
      for (let k = 0; k < 20; k++) if (counts[k] > 6000) order.push(k);
      if (!order.length) return;

      this.sdss = { n, th, r, sliceOf, counts, order };
      this._texA = this._texB = null;
    } catch (e) { console.warn('sdss load failed, synthetic fallback:', e); }
  },

  onResize() { this._texA = this._texB = null; },

  /* bake one declination slice — plot plus reference arcs — into a canvas */
  bakeSlice(k) {
    const s = this.sdss;
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const g2 = c.getContext('2d');
    const cx = W / 2, cy = H * 0.88, Rmax = Math.min(H * 0.80, W * 0.52);

    // reference arcs at even redshifts (same grammar as the orrery's AU rings)
    if (CONFIG.labels) {
      const lut = this._lut || (this._lut = this.buildDcLUT());
      g2.save();
      g2.setLineDash([1, 5]);
      g2.lineWidth = 1;
      g2.strokeStyle = 'rgba(86,94,104,0.30)';
      g2.fillStyle = 'rgba(86,94,104,0.65)';
      g2.font = "8.5px 'IBM Plex Mono', monospace";
      for (const z of [0.05, 0.10, 0.15, 0.20, 0.25]) {
        const fi = z / this.Z_MAX * 256, i0 = Math.min(255, Math.floor(fi));
        const R = (lut[i0] + (lut[i0 + 1] - lut[i0]) * (fi - i0)) * Rmax;
        g2.beginPath();
        g2.arc(cx, cy, R, -Math.PI / 2 - 1.48, -Math.PI / 2 + 1.48);
        g2.stroke();
        g2.fillText(`z = ${z.toFixed(2)}`, cx + 5, cy - R - 4);
      }
      g2.restore();
    }

    g2.fillStyle = '#AFC9DE';
    g2.globalAlpha = 0.5;
    for (let i = 0; i < s.n; i++) {
      if (s.sliceOf[i] !== k) continue;
      const R = s.r[i] * Rmax, a = s.th[i];
      g2.fillRect(cx + R * Math.sin(a) - 0.5, cy - R * Math.cos(a) - 0.5, 1, 1);
    }
    g2.globalAlpha = 1;
    return { k, canvas: c };
  },

  sliceAt(idx) { return this.sdss.order[((idx % this.sdss.order.length) + this.sdss.order.length) % this.sdss.order.length]; },

  drawFan(t) {
    const s = this.sdss;
    const idx = Math.floor(t / this.SLICE_HOLD);
    const kCur = this.sliceAt(idx);
    if (!this._texA || this._texA.k !== kCur || this._texA.canvas.width !== W || this._texA.canvas.height !== H) {
      this._texA = this._texB && this._texB.k === kCur
        && this._texB.canvas.width === W && this._texB.canvas.height === H
        ? this._texB : this.bakeSlice(kCur);
      this._texB = null;
      const dec = kCur * 4 - 2;
      this.detail = `SDSS DR18 · ${Math.round(s.counts[kCur] / 1000)}k galaxies · δ ${dec >= 0 ? '+' : '−'}${Math.abs(dec)}° ± 2° · z < ${this.Z_MAX}`;
      if (scenes[current] === this) setCaption(current);
    }

    const phase = t - idx * this.SLICE_HOLD;
    const fadeF = Math.max(0, (phase - (this.SLICE_HOLD - this.SLICE_FADE)) / this.SLICE_FADE);
    if (fadeF > 0 && !this._texB) this._texB = this.bakeSlice(this.sliceAt(idx + 1));

    const cx = W / 2, cy = H * 0.88;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(0.05 * Math.sin(t * 0.013 * MOTION));   // slow instrument sway
    ctx.translate(-cx, -cy);
    ctx.globalAlpha = 1 - smooth(fadeF);
    ctx.drawImage(this._texA.canvas, 0, 0);
    if (fadeF > 0) {
      ctx.globalAlpha = smooth(fadeF);
      ctx.drawImage(this._texB.canvas, 0, 0);
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  },

  init() {
    this.loadSDSS();   // async; falls back to synthetic web below
    // halo nodes
    const nodes = [];
    for (let i = 0; i < Math.round(110 * Math.sqrt(D)); i++) {
      nodes.push({ x: rand(-1, 1), y: rand(-1, 1), z: rand(-1, 1), mass: Math.pow(Math.random(), 1.6) });
    }
    const pts = [];
    // cluster cores
    for (const nd of nodes) {
      const count = 8 + Math.floor(nd.mass * 42);
      const sigma = 0.018 + nd.mass * 0.03;
      for (let i = 0; i < count; i++) {
        pts.push({
          x: nd.x + gauss() * sigma, y: nd.y + gauss() * sigma, z: nd.z + gauss() * sigma,
          warm: nd.mass > 0.72, a: rand(0.25, 0.85),
        });
      }
    }
    // filaments: each node → its 2 nearest neighbors
    for (const nd of nodes) {
      const nbrs = nodes
        .filter(o => o !== nd)
        .map(o => ({ o, d: (o.x - nd.x) ** 2 + (o.y - nd.y) ** 2 + (o.z - nd.z) ** 2 }))
        .sort((a, b) => a.d - b.d)
        .slice(0, 2);
      for (const { o } of nbrs) {
        const segs = 26;
        for (let i = 0; i < segs; i++) {
          const f = (i + Math.random()) / segs;
          const spread = 0.014 * Math.sin(f * Math.PI) * 3; // fatter mid-filament
          pts.push({
            x: nd.x + (o.x - nd.x) * f + gauss() * spread,
            y: nd.y + (o.y - nd.y) * f + gauss() * spread,
            z: nd.z + (o.z - nd.z) * f + gauss() * spread,
            warm: false, a: rand(0.08, 0.4),
          });
        }
      }
    }
    this.pts = pts;
  },

  draw(t) {
    if (this.sdss) { this.drawFan(t); return; }
    this.drawSynthetic(t);
  },

  drawSynthetic(t) {
    const cx = W / 2, cy = H / 2;
    const scale = Math.min(W, H) * 0.44;
    const yaw = t * 0.055 * MOTION, pitch = 0.42 + 0.07 * Math.sin(t * 0.021 * MOTION);
    const cyw = Math.cos(yaw), syw = Math.sin(yaw);
    const cpt = Math.cos(pitch), spt = Math.sin(pitch);
    const CAM = 3.1;

    for (const p of this.pts) {
      // rotate: yaw about y, pitch about x
      const x1 = p.x * cyw + p.z * syw;
      const z1 = -p.x * syw + p.z * cyw;
      const y2 = p.y * cpt - z1 * spt;
      const z2 = p.y * spt + z1 * cpt;

      const persp = CAM / (CAM + z2);
      const sx = cx + x1 * scale * persp;
      const sy = cy + y2 * scale * persp;

      const depth = Math.max(0, Math.min(1, (1.4 - z2) / 2.8));
      ctx.globalAlpha = p.a * (0.25 + 0.75 * depth);
      ctx.fillStyle = p.warm ? '#C9A26B' : '#9FC3DE';
      const s = (p.warm ? 1.7 : 1.05) * persp;
      ctx.fillRect(sx - s / 2, sy - s / 2, s, s);
    }
    ctx.globalAlpha = 1;
  },
};

/* ============================================================
   SCENE 4 — Planets (grand tour)
   Every planet as it stands now: real mission maps wrapped on
   oblate spheres, rotating on IAU rotation models (central
   meridians verified against JPL Horizons to ≤0.3°, 2000–2026),
   lit by the sun at true phase (Venus shows its real crescent),
   real Gaia field behind each planet's true geocentric direction,
   camera up = each planet's IAU pole. Saturn carries its rings at
   real radii and the true (currently near-edge-on) opening;
   Jupiter its Horizons-verified Galilean moons; Earth is seen
   from over the configured ?lat/lon with VIIRS night lights on
   the dark side and the Moon alongside.

   The tour dwells on each planet, then swings the camera across
   the real sky to the next planet's actual direction — the
   impossible speed of that camera is the scene's one licensed
   fiction. Time runs at 1 s = 2 min so rotations are visible;
   moon orbital radii are compressed beyond 1.4 planet radii
   (limb contact stays exact). Both captioned.
   ============================================================ */
const planetView = {

  PLANETS: [

  GALILEAN: [

  MOONSPEC: { name: 'MOON', c: '#C9CDD3', s: 2.2 },
  CHARONSPEC: { name: 'CHARON', c: '#B6B2AC', s: 2.0 },

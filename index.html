  URANUS_RINGS: [
    [1.637, 0.05], [1.652, 0.06], [1.666, 0.07],   // rings 6, 5, 4
    [1.750, 0.12],                                 // alpha
    [1.786, 0.12],                                 // beta
    [1.846, 0.09],                                 // eta
    [1.863, 0.12],                                 // gamma
    [1.890, 0.11],                                 // delta
    [1.957, 0.05],                                 // lambda
    [2.001, 0.30],                                 // epsilon
  ],

  tAnchor: 0, jdAnchor: 0, _tour: -1, _cap: '', _title: '',
  _globes: {}, _touch: 0, _earthSeg: null, _earthF: null,

  init() {
    const DEG = Math.PI / 180;
    for (const p of this.PLANETS) {
      if (p.pole) {
        const a = p.pole[0] * DEG, d = p.pole[1] * DEG, c = Math.cos(d);
        p.P = [c * Math.cos(a), c * Math.sin(a), Math.sin(d)];
      } else {
        p.P = [0, 0, 1];
      }
      p.orr = orrery.planets[p.oi];
    }
    this.DWELL = params.has('dwell')
      ? Math.max(10, num('dwell', 75))
      : (CONFIG.scene !== null || CONFIG.view === 'tour') ? 75
      : Math.max(12, Math.min(150, (CONFIG.hold - 2 * CONFIG.fade) / 2 - this.TRANSIT));
    if (CONFIG.planet !== null && CONFIG.planet !== undefined) {
      const byName = this.PLANETS.findIndex(p => p.key === String(CONFIG.planet).toLowerCase());
      const idx = byName >= 0 ? byName : Math.floor(num('planet', 0));
      this._tour = ((idx % this.PLANETS.length) + this.PLANETS.length) % this.PLANETS.length - 1;
    }
  },
  onResize() { this._globes = {}; },

  enter(tClock) {
    this.tAnchor = tClock - num('t0', 0);   // t0: debug scene-clock offset
    this.jdAnchor = Date.now() / 86400000 + 2440587.5;
    this._tour = (this._tour + 1) % this.PLANETS.length;
    this._cap = ''; this._title = '';
    this._earthSeg = null; this._earthF = null;
    this._jump = null;
  },

  /* animated skip to an adjacent planet (arrows/buttons in the dedicated
     tour view): the same camera slew as the scheduled transits, in
     either direction */
  jump(dir) {
    if (this._lastT === undefined) return;
    const N = this.PLANETS.length;
    let from;
    if (this._jump) {
      from = this._jump.to;
    } else {
      const tL = this._lastT - this.tAnchor;
      const CYC = this.DWELL + this.TRANSIT;
      const seg = Math.floor(tL / CYC);
      const ph = tL - seg * CYC;
      const iA = ((this._tour + seg) % N + N) % N;
      from = ph > this.DWELL ? (iA + 1) % N : iA;   // mid-transit: from its target
    }
    this._jump = { from, to: ((from + dir) % N + N) % N, start: this._lastT };
  },

  _eq(x, y, z) {
    const DEG = Math.PI / 180;
    const ce = Math.cos(23.43928 * DEG), se = Math.sin(23.43928 * DEG);
    return [x, y * ce - z * se, y * se + z * ce];
  },
  _gmst(jd) {
    return (((280.46061837 + 360.98564736629 * (jd - 2451545.0)) % 360) + 360) % 360;
  },
  _norm(v) {
    const n = Math.hypot(v[0], v[1], v[2]);
    return [v[0] / n, v[1] / n, v[2] / n];
  },
  /* great-circle interpolation between unit vectors; detours via a
     waypoint when nearly antipodal */
  _slerp(a, b, t) {
    const d = Math.max(-1, Math.min(1, a[0] * b[0] + a[1] * b[1] + a[2] * b[2]));
    const ang = Math.acos(d);
    if (ang < 1e-4) return this._norm([a[0] + (b[0] - a[0]) * t, a[1] + (b[1] - a[1]) * t, a[2] + (b[2] - a[2]) * t]);
    if (ang > Math.PI - 0.05) {   // near-antipodal: detour via a waypoint
      const mid = this._norm([a[1], -a[0], 0.001]);
      return t < 0.5 ? this._slerp(a, mid, t * 2) : this._slerp(mid, b, t * 2 - 1);
    }
    const sa = Math.sin(ang);
    const wa = Math.sin((1 - t) * ang) / sa, wb = Math.sin(t * ang) / sa;
    return this._norm([a[0] * wa + b[0] * wb, a[1] * wa + b[1] * wb, a[2] * wa + b[2] * wb]);
  },

  /* full state of one planet at a JD: camera basis (from Earth — or the
     configured zenith for Earth itself — pole-up), central meridian,
     sub-Earth planetocentric latitude, sun direction in camera coords,
     ring-plane sun elevation, moons */
  system(jd, p, frozenF) {
    const DEG = Math.PI / 180, T = (jd - 2451545.0) / 36525;
    const e3 = orrery.helioEcl(orrery.planets[2], T);
    let F, dist, h3;
    if (p.zenith) {
      h3 = e3;
      if (frozenF) { F = frozenF; }
      else {
        const lst = (this._gmst(jd) + CONFIG.lon) * DEG, phi = CONFIG.lat * DEG;
        const cp = Math.cos(phi);
        F = [-cp * Math.cos(lst), -cp * Math.sin(lst), -Math.sin(phi)];  // looking down
      }
      dist = 0;
    } else {
      h3 = orrery.helioEcl(p.orr, T);
      const g = this._eq(h3.x - e3.x, h3.y - e3.y, h3.z - e3.z);
      dist = Math.hypot(g[0], g[1], g[2]);
      F = [g[0] / dist, g[1] / dist, g[2] / dist];
    }
    const P = p.P;
    const dp = P[0] * F[0] + P[1] * F[1] + P[2] * F[2];
    const U = this._norm([P[0] - dp * F[0], P[1] - dp * F[1], P[2] - dp * F[2]]);
    const Rt = [F[1] * U[2] - F[2] * U[1], F[2] * U[0] - F[0] * U[2], F[0] * U[1] - F[1] * U[0]];
    const De = Math.asin(Math.max(-1, Math.min(1, -dp)));

    const rh = Math.hypot(h3.x, h3.y, h3.z) || 1;
    const s = this._norm(this._eq(-h3.x / rh, -h3.y / rh, -h3.z / rh));
    const sun = [s[0] * Rt[0] + s[1] * Rt[1] + s[2] * Rt[2],
                 s[0] * U[0] + s[1] * U[1] + s[2] * U[2],
                 -(s[0] * F[0] + s[1] * F[1] + s[2] * F[2])];

    let cm;
    if (p.zenith) {
      cm = ((Math.atan2(-F[1], -F[0]) / DEG - this._gmst(jd)) % 360 + 360) % 360;
    } else {
      const node = this._norm([-P[1], P[0], 0]);
      const m = [P[1] * node[2] - P[2] * node[1],
                 P[2] * node[0] - P[0] * node[2],
                 P[0] * node[1] - P[1] * node[0]];
      const th = Math.atan2(-(F[0] * m[0] + F[1] * m[1] + F[2] * m[2]),
                            -(F[0] * node[0] + F[1] * node[1] + F[2] * node[2])) / DEG;
      const dlt = jd - 2451545.0 - dist * 0.0057755183;   // light-time corrected
      cm = ((p.conv * (p.W0 + p.Wd * dlt - th)) % 360 + 360) % 360;
    }

    const out = { F, U, Rt, De, sun, cm, dist, h3 };
    if (p.rings) out.Ds = Math.asin(Math.max(-1, Math.min(1, s[0] * P[0] + s[1] * P[1] + s[2] * P[2])));
    if (p.moons === 'galilean') out.moons = this._galilean(jd, De);
    else if (p.moons === 'moon') out.moons = this._earthMoon(T, F, Rt, U);
    else if (p.moons === 'charon') out.moons = this._charon(p, jd, dist, F, Rt, U);
    return out;
  },

  /* Charon rides directly on Pluto's rotation model: the pair is tidally
     locked and Pluto's IAU prime meridian is DEFINED by the sub-Charon
     point, so Charon sits along the prime-meridian direction at 16.49
     Pluto radii (19,596 km / 1,188 km) — verified against Horizons to
     <1 R_P. */
  _charon(p, jd, dist, F, Rt, U) {
    const DEG = Math.PI / 180, P = p.P;
    const node = this._norm([-P[1], P[0], 0]);
    const m = [P[1] * node[2] - P[2] * node[1],
               P[2] * node[0] - P[0] * node[2],
               P[0] * node[1] - P[1] * node[0]];
    const Wr = (p.W0 + p.Wd * (jd - 2451545.0 - dist * 0.0057755183)) * DEG;
    const c = [node[0] * Math.cos(Wr) + m[0] * Math.sin(Wr),
               node[1] * Math.cos(Wr) + m[1] * Math.sin(Wr),
               node[2] * Math.cos(Wr) + m[2] * Math.sin(Wr)];
    const AR = 16.49;
    return [{
      X: (c[0] * Rt[0] + c[1] * Rt[1] + c[2] * Rt[2]) * AR,
      Y: (c[0] * U[0] + c[1] * U[1] + c[2] * U[2]) * AR,
      front: (c[0] * F[0] + c[1] * F[1] + c[2] * F[2]) < 0,
      spec: this.CHARONSPEC,
    }];
  },

  /* Galilean moons (Meeus, Astronomical Algorithms ch. 44, low accuracy).
     X + toward screen right, Y + toward screen up (pole-up camera), in
     Jupiter equatorial radii; in front of the disk when cos u > 0 —
     verified against JPL Horizons at multiple epochs to ~0.05 R_J. */
  _galilean(jd, De) {
    const DEG = Math.PI / 180, d = jd - 2451545.0;
    const V = (172.74 + 0.00111588 * d) * DEG;
    const M = (357.529 + 0.9856003 * d) * DEG;
    const N = (20.020 + 0.0830853 * d + 0.329 * Math.sin(V)) * DEG;
    const J = (66.115 + 0.9025179 * d - 0.329 * Math.sin(V)) * DEG;
    const A = (1.915 * Math.sin(M) + 0.020 * Math.sin(2 * M)) * DEG;
    const B = (5.555 * Math.sin(N) + 0.168 * Math.sin(2 * N)) * DEG;
    const K = J + A - B;
    const Rse = 1.00014 - 0.01671 * Math.cos(M) - 0.00014 * Math.cos(2 * M);
    const rsj = 5.20872 - 0.25208 * Math.cos(N) - 0.00611 * Math.cos(2 * N);
    const del = Math.sqrt(rsj * rsj + Rse * Rse - 2 * rsj * Rse * Math.cos(K));
    const psi = Math.asin(Math.max(-1, Math.min(1, Rse / del * Math.sin(K))));
    const dd = d - del / 173;
    const u = [
      (163.8069 + 203.4058646 * dd) * DEG + psi - B,
      (358.4140 + 101.2916335 * dd) * DEG + psi - B,
      (5.7176 + 50.2345180 * dd) * DEG + psi - B,
      (224.8092 + 21.4879800 * dd) * DEG + psi - B,
    ];
    const G = (331.18 + 50.310482 * dd) * DEG;
    const H = (87.40 + 21.569231 * dd) * DEG;
    const uc = [
      u[0] + 0.473 * DEG * Math.sin(2 * (u[0] - u[1])),
      u[1] + 1.065 * DEG * Math.sin(2 * (u[1] - u[2])),
      u[2] + 0.165 * DEG * Math.sin(G),
      u[3] + 0.843 * DEG * Math.sin(H),
    ];
    const rr = [
      5.9057 - 0.0244 * Math.cos(2 * (u[0] - u[1])),
      9.3966 - 0.0882 * Math.cos(2 * (u[1] - u[2])),
      14.9883 - 0.0216 * Math.cos(G),
      26.3627 - 0.1939 * Math.cos(H),
    ];
    const sDe = Math.sin(De);
    return uc.map((ui, k) => ({
      X: rr[k] * Math.sin(ui),
      Y: -rr[k] * Math.cos(ui) * sDe,
      front: Math.cos(ui) > 0,
      spec: this.GALILEAN[k],
    }));
  },

  /* the Moon, geocentric, from the same low-precision lunar theory as the
     Local Sky scene; position vector in Earth radii projected into the
     camera frame */
  _earthMoon(T, F, Rt, U) {
    const DEG = Math.PI / 180;
    const S = (a, b) => Math.sin((a + b * T) * DEG);
    const C = (a, b) => Math.cos((a + b * T) * DEG);
    const lam = (218.32 + 481267.883 * T
      + 6.29 * S(134.9, 477198.85) - 1.27 * S(259.2, -413335.38)
      + 0.66 * S(235.7, 890534.23) + 0.21 * S(269.9, 954397.70)
      - 0.19 * S(357.5, 35999.05) - 0.11 * S(186.6, 966404.05)) * DEG;
    const bet = (5.13 * S(93.3, 483202.03) + 0.28 * S(228.2, 960400.87)
      - 0.28 * S(318.3, 6003.18) - 0.17 * S(217.6, -407332.20)) * DEG;
    const par = (0.9508
      + 0.0518 * C(134.9, 477198.85) + 0.0095 * C(259.2, -413335.38)
      + 0.0078 * C(235.7, 890534.23) + 0.0028 * C(269.9, 954397.70)) * DEG;
    const dR = 1 / Math.sin(par);           // distance in Earth radii
    const cb = Math.cos(bet);
    const v = this._eq(cb * Math.cos(lam) * dR, cb * Math.sin(lam) * dR, Math.sin(bet) * dR);
    return [{
      X: v[0] * Rt[0] + v[1] * Rt[1] + v[2] * Rt[2],
      Y: v[0] * U[0] + v[1] * U[1] + v[2] * U[2],
      front: (v[0] * F[0] + v[1] * F[1] + v[2] * F[2]) < 0,
      spec: this.MOONSPEC,
    }];
  },

  /* ---------- globe renderer (per-planet cached state) ---------- */

  _globe(key) {
    let g = this._globes[key];
    if (!g) {
      const canvas = document.createElement('canvas');
      g = this._globes[key] = { canvas, ctx2: canvas.getContext('2d'),
                                geom: null, shadeJd: -1e9, lastXoff: -1 };
      const keys = Object.keys(this._globes);
      if (keys.length > 3) {
        keys.sort((a, b) => (this._globes[a].lastUse || 0) - (this._globes[b].lastUse || 0));
        if (keys[0] !== key) delete this._globes[keys[0]];
      }
    }
    g.lastUse = ++this._touch;
    return g;
  },

  /* per-pixel LUTs for the orthographic oblate sphere: texture row, texel
     offset from the central meridian, lighting normal, feathered alpha */
  buildGeom(g, S, map, p, De) {
    const reg = planetMaps.registry[p.key];
    const b = 1 - p.flat, Req = S / 2 - 1.5, c = S / 2;
    const TW = map.w, TH = map.h;
    const k2 = -p.conv * reg.texDir;      // dλ (screen-right +) → texel direction
    const cD = Math.cos(De), sD = Math.sin(De);
    const cap = Math.ceil(Math.PI / 4 * S * S) + S * 4;
    const outIdx = new Uint32Array(cap), rowBase = new Uint32Array(cap);
    const texXq = new Uint16Array(cap), alpha = new Uint8Array(cap);
    const nx = new Float32Array(cap), ny = new Float32Array(cap), nz = new Float32Array(cap);
    let n = 0;
    for (let py = 0; py < S; py++) {
      const Yu = (c - (py + 0.5)) / (Req * b);
      for (let px = 0; px < S; px++) {
        const X = (px + 0.5 - c) / Req;
        const r2 = X * X + Yu * Yu;
        if (r2 >= 1) continue;
        const Z = Math.sqrt(1 - r2);
        const yp = Yu * cD + Z * sD;                          // planet frame
        const zp = -Yu * sD + Z * cD;
        const latC = Math.atan2(b * yp, Math.hypot(X, zp));   // planetocentric
        const dLon = Math.atan2(X, zp);                       // 0 at CM, + right
        let row = Math.floor((0.5 - latC / Math.PI) * TH);
        row = Math.max(0, Math.min(TH - 1, row));
        outIdx[n] = (py * S + px) * 4;
        rowBase[n] = row * TW;
        texXq[n] = ((Math.round(k2 * dLon / TAU * TW) % TW) + TW) % TW;
        alpha[n] = Math.min(1, (1 - Math.sqrt(r2)) * Req * 0.8) * 255;
        nx[n] = X; ny[n] = Yu; nz[n] = Z;
        n++;
      }
    }
    const img = new ImageData(S, S);
    for (let k = 0; k < n; k++) img.data[outIdx[k] + 3] = alpha[k];
    g.canvas.width = g.canvas.height = S;
    g.geom = { S, n, outIdx, rowBase, texXq, nx, ny, nz, img,
               shade: new Uint8Array(n), nlit: map.night ? new Uint8Array(n) : null,
               De, flat: p.flat, tex: map, TW };
    g.shadeJd = -1e9;
    g.lastXoff = -1;
  },

  /* limb darkening × terminator from the true sun direction; recomputed
     when the phase geometry has drifted (fast for Mercury/Venus) */
  buildShade(g, sun) {
    const G2 = g.geom;
    G2.sunCam = sun;              // kept for the ring-shadow wedge
    for (let k = 0; k < G2.n; k++) {
      const mu = G2.nz[k];
      const lit = G2.nx[k] * sun[0] + G2.ny[k] * sun[1] + mu * sun[2];
      let tf = (lit + 0.015) / 0.10;
      tf = tf < 0 ? 0 : tf > 1 ? 1 : tf;
      tf = smooth(tf);
      G2.shade[k] = 255 * (0.35 + 0.65 * Math.pow(mu, 0.6)) * tf;
      if (G2.nlit) G2.nlit[k] = (1 - tf) * 218;    // night-lights weight (×0.85)
    }
    g.lastXoff = -1;   // force repaint
  },

  _repaint(g, p, cm) {
    const G2 = g.geom, TW = G2.TW;
    const reg = planetMaps.registry[p.key];
    const base = ((cm - reg.lonLeft) * reg.texDir / 360 % 1 + 1) % 1;
    const xoff = Math.round(base * TW) % TW;
    if (xoff === g.lastXoff) return;
    g.lastXoff = xoff;
    const td = G2.tex.data, tn = G2.tex.night, o = G2.img.data;
    const oi = G2.outIdx, rb = G2.rowBase, tx = G2.texXq, sh = G2.shade, nl = G2.nlit;
    if (tn && nl) {
      for (let k = 0; k < G2.n; k++) {
        let x = tx[k] + xoff; if (x >= TW) x -= TW;
        const j = (rb[k] + x) << 2, i = oi[k], s2 = sh[k], w2 = nl[k];
        o[i]     = ((td[j] * s2) >> 8) + ((tn[j] * w2) >> 8);
        o[i + 1] = ((td[j + 1] * s2) >> 8) + ((tn[j + 1] * w2) >> 8);
        o[i + 2] = ((td[j + 2] * s2) >> 8) + ((tn[j + 2] * w2) >> 8);
      }
    } else {
      for (let k = 0; k < G2.n; k++) {
        let x = tx[k] + xoff; if (x >= TW) x -= TW;
        const j = (rb[k] + x) << 2, i = oi[k], s2 = sh[k];
        o[i]     = (td[j] * s2) >> 8;
        o[i + 1] = (td[j + 1] * s2) >> 8;
        o[i + 2] = (td[j + 2] * s2) >> 8;
      }
    }
    g.ctx2.putImageData(G2.img, 0, 0);
  },

  /* prerender the ring system (it doesn't rotate visibly): two strips,
     the far half drawn behind the globe and the near half in front.
     Saturn: per-radius color/alpha sampled from the Cassini PIA08389
     radial scan (banded fallback offline). Uranus: the real narrow
     rings. Both get the planet's shadow: the anti-sunward wedge where
     the globe blocks the sun (sun at infinity, oblateness ignored) is
     punched out of the prerender. */
  buildRings(g, De, Ds, p) {
    const S = g.geom.S, R = S / 2;
    const sinDe = Math.sin(De), absS = Math.max(Math.abs(sinDe), 0.0012);
    const uranian = p.rings === 'uranus';
    const OUT = uranian ? 2.05 : 2.35;
    const W2 = Math.ceil(OUT * S) + 4;
    const H2 = Math.max(10, Math.ceil(OUT * S * absS) + 6);
    const sameSide = (Ds > 0) === (De > 0);
    const light = (sameSide ? 1 : 0.28) *
      Math.min(1, 0.35 + Math.abs(Ds) / (8 * Math.PI / 180) * 0.65);
    const profile = planetMaps.peek(p.key)?.ringProfile || null;
    const halves = {};
    for (const half of ['back', 'front']) {
      const c = document.createElement('canvas');
      c.width = W2; c.height = H2;
      const g2 = c.getContext('2d');
      const cx = W2 / 2, cy = H2 / 2;
      // far half appears above center when De>0 (canvas y down: sinφ<0)
      const up = (De > 0) === (half === 'back');
      const a0 = up ? Math.PI : 0, a1 = up ? TAU : Math.PI;
      if (uranian) {
        for (const [rho, al] of this.URANUS_RINGS) {
          g2.strokeStyle = `rgba(150,146,140,${(al * light).toFixed(3)})`;
          g2.lineWidth = rho > 1.99 ? 1.1 : 0.7;
          g2.beginPath();
          g2.ellipse(cx, cy, rho * R, Math.max(0.35, rho * R * absS), 0, a0, a1);
          g2.stroke();
        }
      } else if (profile) {
        const step = Math.max(1.2, S / 560) / R;
        g2.lineWidth = step * R + 0.8;
        const k0 = this.RINGS_KM0, k1 = this.RINGS_KM1, rs = this.R_SAT_KM;
        for (let rho = k0 / rs; rho < k1 / rs; rho += step) {
          const i = Math.min(profile.w - 1,
            Math.max(0, Math.floor((rho * rs - k0) / (k1 - k0) * profile.w))) * 4;
          const al = profile.data[i + 3] / 255;
          if (al < 0.01) continue;
          g2.strokeStyle = `rgba(${profile.data[i]},${profile.data[i + 1]},` +
            `${profile.data[i + 2]},${(al * light).toFixed(3)})`;
          g2.beginPath();
          g2.ellipse(cx, cy, rho * R, Math.max(0.35, rho * R * absS), 0, a0, a1);
          g2.stroke();
        }
      } else {
        const step = Math.max(1.2, S / 560) / R;
        g2.lineWidth = step * R + 0.8;
        for (const [r0, r1, al] of this.RINGS) {
          for (let rho = r0; rho < r1; rho += step) {
            g2.strokeStyle = `rgba(201,190,168,${(al * light).toFixed(3)})`;
            g2.beginPath();
            g2.ellipse(cx, cy, rho * R, Math.max(0.35, rho * R * absS), 0, a0, a1);
            g2.stroke();
          }
        }
      }
      // planet shadow: wedge around the anti-sun azimuth, half-width
      // asin(1/rho) at each radius (curved edges)
      const sun = g.geom.sunCam || [0, 0, 1];
      const phiS = Math.atan2(sun[1] * sinDe - sun[2] * Math.cos(De), sun[0]);
      const phiC = phiS + Math.PI;
      const rIn = uranian ? 1.55 : 1.20, rOut = OUT;
      g2.save();
      g2.globalCompositeOperation = 'destination-out';
      g2.fillStyle = 'rgba(0,0,0,0.88)';
      g2.beginPath();
      const NPT = 26;
      for (let k = 0; k <= NPT; k++) {
        const rho = rIn + (rOut - rIn) * k / NPT;
        const ph = phiC - Math.asin(Math.min(1, 1 / rho));
        const x = cx + rho * R * Math.cos(ph);
        const y = cy - rho * R * sinDe * Math.sin(ph);
        k === 0 ? g2.moveTo(x, y) : g2.lineTo(x, y);
      }
      for (let k = NPT; k >= 0; k--) {
        const rho = rIn + (rOut - rIn) * k / NPT;
        const ph = phiC + Math.asin(Math.min(1, 1 / rho));
        g2.lineTo(cx + rho * R * Math.cos(ph),
                  cy - rho * R * sinDe * Math.sin(ph));
      }
      g2.closePath();
      g2.fill();
      g2.restore();
      halves[half] = c;
    }
    g.rings = { back: halves.back, front: halves.front, W2, H2 };
  },

  /* draw one planet globe; returns {px, py, r} or null if not drawn */
  drawGlobe(p, sys, scale, cam, jd, diskR) {
    if (scale < 0.004) return null;
    const vz = sys.F[0] * cam.F[0] + sys.F[1] * cam.F[1] + sys.F[2] * cam.F[2];
    if (vz < 0.15) return null;
    const px = cam.cx0 + (sys.F[0] * cam.Rt[0] + sys.F[1] * cam.Rt[1] + sys.F[2] * cam.Rt[2]) / vz * cam.f;
    const py = cam.cy0 - (sys.F[0] * cam.U[0] + sys.F[1] * cam.U[1] + sys.F[2] * cam.U[2]) / vz * cam.f;
    const r = diskR * scale;
    if (r < 2.2) return null;
    if (px < -3 * r || px > W + 3 * r || py < -3 * r || py > H + 3 * r) return null;

    planetMaps.request(p.key);
    const map = planetMaps.peek(p.key);
    if (!map) {          // still decoding: quiet placeholder
      const g = ctx.createRadialGradient(px, py, 0, px, py, r);
      g.addColorStop(0, p.orr.c + '55');
      g.addColorStop(1, p.orr.c + '00');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(px, py, r, 0, TAU); ctx.fill();
      return { px, py, r };
    }

    const S = Math.min(840, Math.round(2 * diskR * Math.min(DPR, 2)));
    const g = this._globe(p.key);
    if (!g.geom || g.geom.S !== S || g.geom.tex !== map
        || g.geom.flat !== p.flat || Math.abs(g.geom.De - sys.De) > 0.005) {
      this.buildGeom(g, S, map, p, sys.De);
    }
    if (Math.abs(jd - g.shadeJd) > 0.1) {
      this.buildShade(g, sys.sun);
      if (p.rings) this.buildRings(g, sys.De, sys.Ds, p);
      g.shadeJd = jd;
    }
    this._repaint(g, p, sys.cm);

    if (p.rings && g.rings) {
      const sc = 2 * r / g.geom.S;
      const rw = g.rings.W2 * sc, rh = g.rings.H2 * sc;
      ctx.drawImage(g.rings.back, px - rw / 2, py - rh / 2, rw, rh);
      ctx.drawImage(g.canvas, px - r, py - r, 2 * r, 2 * r);
      ctx.drawImage(g.rings.front, px - rw / 2, py - rh / 2, rw, rh);
    } else {
      ctx.drawImage(g.canvas, px - r, py - r, 2 * r, 2 * r);
    }
    return { px, py, r };
  },

  /* moons around a (near-full-size) globe: true directions and periods,
     radial distance compressed beyond KNEE — limb contact stays exact */
  drawMoons(p, sys, at, alpha, minDim) {
    const bE = 1 - p.flat;
    const font = (px) => `${px}px 'IBM Plex Mono', monospace`;
    for (const mn of sys.moons) {
      const rho = Math.hypot(mn.X, mn.Y);
      const ell = mn.X * mn.X + (mn.Y / bE) * (mn.Y / bE);
      if (!mn.front && ell < 1) continue;                    // occulted
      let fade = alpha;
      if (!mn.front && ell < 1.35) fade *= smooth((ell - 1) / 0.35);
      const rs = rho <= this.KNEE ? 1
        : this.KNEE * Math.pow(rho / this.KNEE, this.GAMMA) / rho;
      const px = at.px + mn.X * rs * at.r;
      const py = at.py - mn.Y * rs * at.r;
      if (px < -20 || px > W + 20 || py < -20 || py > H + 20) continue;
      const sz = mn.spec.s * Math.max(0.75, minDim / 900);
      if (mn.front && ell < 1) {          // transiting: rim for contrast
        ctx.globalAlpha = fade;
        ctx.fillStyle = 'rgba(0,0,0,0.38)';
        ctx.beginPath(); ctx.arc(px, py, sz * 1.9, 0, TAU); ctx.fill();
      }
      const g = ctx.createRadialGradient(px, py, 0, px, py, sz * 4);
      g.addColorStop(0, mn.spec.c + 'BB');
      g.addColorStop(0.3, mn.spec.c + '44');
      g.addColorStop(1, mn.spec.c + '00');
      ctx.globalAlpha = fade;
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(px, py, sz * 4, 0, TAU); ctx.fill();
      ctx.fillStyle = mn.spec.c;
      ctx.beginPath(); ctx.arc(px, py, sz, 0, TAU); ctx.fill();
      if (CONFIG.labels) {
        ctx.fillStyle = 'rgba(154,163,173,0.42)';
        ctx.font = font(8.5);
        ctx.fillText(mn.spec.name, px + sz + 5, py + 10);
      }
      ctx.globalAlpha = 1;
    }
  },

  /* real Gaia field behind the camera direction — no twinkle, no
     extinction: there is no atmosphere out here */
  drawStars(cam) {
    if (!localSky.built || localSky.builtFrom !== gaiaCatalog.data?.source) localSky.build();
    if (!localSky.built) return;
    const B = localSky.built, sprites = gaiaCatalog.data.sprites;
    const [Fx, Fy, Fz] = cam.F, [Ux2, Uy2, Uz2] = cam.U, [Rx, Ry, Rz] = cam.Rt;
    const halfDiag = Math.atan(Math.hypot(Math.max(cam.cx0, W - cam.cx0),
                                          Math.max(cam.cy0, H - cam.cy0)) / cam.f);
    const cosCull = Math.cos(halfDiag + 0.24);
    const minvz = Math.cos(halfDiag + 0.06);
    const magLim = D >= 1 ? 99 : 8.2 + 1.8 * D;
    ctx.fillStyle = '#C9D2DC';
    for (let b2 = 0; b2 < B.nb2; b2++) {
      if (B.bcx[b2] * Fx + B.bcy[b2] * Fy + B.bcz[b2] * Fz < cosCull) continue;
      for (let k = B.starts[b2]; k < B.starts[b2 + 1]; k++) {
        const i = B.order[k];
        const x = B.vx[i], y = B.vy[i], z = B.vz[i];
        const vz2 = x * Fx + y * Fy + z * Fz;
        if (vz2 < minvz) continue;
        if (B.mag[i] > magLim) continue;
        const px = cam.cx0 + (x * Rx + y * Ry + z * Rz) / vz2 * cam.f;
        const py = cam.cy0 - (x * Ux2 + y * Uy2 + z * Uz2) / vz2 * cam.f;
        if (px < -8 || px > W + 8 || py < -8 || py > H + 8) continue;
        if (B.mag[i] < 6) {
          const s = (0.9 + (6 - B.mag[i]) * 0.5) * 4;
          ctx.globalAlpha = B.alpha[i] * 0.9;
          ctx.drawImage(sprites[B.bk[i]], px - s, py - s, s * 2, s * 2);
        } else {
          ctx.globalAlpha = B.alpha[i] * 0.8;
          ctx.fillRect(px, py, 1.2, 1.2);
        }
      }
    }
    ctx.globalAlpha = 1;
  },

  /* the Sun and every other planet as dots at their true directions and
     apparent magnitudes — the destination is a real point of light you
     watch grow into a world */
  drawSystemDots(jd, cam, skipKeys) {
    const T = (jd - 2451545.0) / 36525;
    const e3 = orrery.helioEcl(orrery.planets[2], T);
    const proj = (dir) => {
      const vz = dir[0] * cam.F[0] + dir[1] * cam.F[1] + dir[2] * cam.F[2];
      if (vz < 0.25) return null;
      const px = cam.cx0 + (dir[0] * cam.Rt[0] + dir[1] * cam.Rt[1] + dir[2] * cam.Rt[2]) / vz * cam.f;
      const py = cam.cy0 - (dir[0] * cam.U[0] + dir[1] * cam.U[1] + dir[2] * cam.U[2]) / vz * cam.f;
      if (px < -30 || px > W + 30 || py < -30 || py > H + 30) return null;
      return [px, py];
    };
    { // Sun at true angular size, restrained
      const dS = Math.hypot(e3.x, e3.y, e3.z);
      const at = proj(this._norm(this._eq(-e3.x, -e3.y, -e3.z)));
      if (at) {
        const rpx = 0.00465 / dS * cam.f;
        const g = ctx.createRadialGradient(at[0], at[1], 0, at[0], at[1], rpx * 6);
        g.addColorStop(0, 'rgba(255,246,228,0.9)');
        g.addColorStop(0.18, 'rgba(240,214,160,0.45)');
        g.addColorStop(1, 'rgba(232,217,176,0)');
        ctx.fillStyle = g;
        ctx.beginPath(); ctx.arc(at[0], at[1], rpx * 6, 0, TAU); ctx.fill();
      }
    }
    for (const p of this.PLANETS) {
      if (p.zenith || skipKeys.includes(p.key)) continue;
      const h3 = orrery.helioEcl(p.orr, T);
      const g = this._eq(h3.x - e3.x, h3.y - e3.y, h3.z - e3.z);
      const dg = Math.hypot(g[0], g[1], g[2]);
      const at = proj([g[0] / dg, g[1] / dg, g[2] / dg]);
      if (!at) continue;
      const dh = Math.hypot(h3.x, h3.y, h3.z);
      const mag = p.orr.m0 + 5 * Math.log10(dh * dg);
      const size = Math.min(3.4, Math.max(0.9, 0.7 + (5.5 - mag) * 0.3));
      ctx.globalAlpha = Math.max(0.25, Math.min(1, 1 - (mag - 6) / 8));
      const gr = ctx.createRadialGradient(at[0], at[1], 0, at[0], at[1], size * 4);
      gr.addColorStop(0, p.orr.c + 'AA');
      gr.addColorStop(0.3, p.orr.c + '44');
      gr.addColorStop(1, p.orr.c + '00');
      ctx.fillStyle = gr;
      ctx.beginPath(); ctx.arc(at[0], at[1], size * 4, 0, TAU); ctx.fill();
      ctx.fillStyle = p.orr.c;
      ctx.beginPath(); ctx.arc(at[0], at[1], size * 0.75, 0, TAU); ctx.fill();
      ctx.globalAlpha = 1;
    }
  },

  draw(t) {
    const minDim = Math.min(W, H);
    this._lastT = t;
    const N = this.PLANETS.length;
    const CYC = this.DWELL + this.TRANSIT;
    let iA, iB, prog, ph, seg = 0;
    if (this._jump && (t - this._jump.start) / this.TRANSIT >= 1) {
      // manual skip arrived: re-anchor the tour at the target, keeping
      // the ephemeris clock continuous
      this.jdAnchor += (t - this.tAnchor) * this.SPEED / 86400 * MOTION;
      this.tAnchor = t;
      this._tour = this._jump.to;
      this._visit = (this._visit || 0) + 1;
      this._jump = null;
    }
    if (this._jump) {
      iA = this._jump.from; iB = this._jump.to;
      prog = Math.max(1e-4, (t - this._jump.start) / this.TRANSIT);
      ph = this.DWELL + prog * this.TRANSIT;
    } else {
      const tL = t - this.tAnchor;
      seg = Math.floor(tL / CYC);
      ph = tL - seg * CYC;
      iA = ((this._tour + seg) % N + N) % N;
      iB = (iA + 1) % N;
      prog = ph <= this.DWELL ? 0 : Math.min(1, (ph - this.DWELL) / this.TRANSIT);
    }
    const A = this.PLANETS[iA], Bp = this.PLANETS[iB];
    const jd = this.jdAnchor + (t - this.tAnchor) * this.SPEED / 86400 * MOTION;

    planetMaps.request(A.key);
    if (ph > this.DWELL * 0.4) planetMaps.request(Bp.key);

    // freeze Earth's camera direction per visit (inertial hover: the
    // planet rotates under the camera like every other stop)
    if (A.zenith) {
      const segKey = (this._visit || 0) + ':' + seg + ':' + iA;
      if (this._earthSeg !== segKey) { this._earthSeg = segKey; this._earthF = null; }
      if (!this._earthF) this._earthF = this.system(jd, A, null).F;
    }
    const sysA = this.system(jd, A, A.zenith ? this._earthF : null);
    let sysB = null;
    let F = sysA.F, U = sysA.U, Rt = sysA.Rt;
    if (prog > 0) {
      sysB = this.system(jd, Bp, null);
      const sE = smooth(prog);
      F = this._slerp(sysA.F, sysB.F, sE);
      const PA = A.P, PB = Bp.P;
      const Pm = this._norm([PA[0] + (PB[0] - PA[0]) * sE,
                             PA[1] + (PB[1] - PA[1]) * sE,
                             PA[2] + (PB[2] - PA[2]) * sE]);
      const dpm = Pm[0] * F[0] + Pm[1] * F[1] + Pm[2] * F[2];
      U = this._norm([Pm[0] - dpm * F[0], Pm[1] - dpm * F[1], Pm[2] - dpm * F[2]]);
      Rt = [F[1] * U[2] - F[2] * U[1], F[2] * U[0] - F[0] * U[2], F[0] * U[1] - F[1] * U[0]];
    } else if (ph > this.DWELL - 2) {
      // pre-warm the next globe so the transit doesn't hitch
      const sysB0 = this.system(jd, Bp, null);
      this.drawGlobeWarm(Bp, sysB0, jd, 0.27 * minDim);
    }

    const cam = {
      F, U, Rt,
      f: (W / 2) / Math.tan(this.FOV_H / 2),
      cx0: W * 0.42 + W * 0.020 * Math.sin(t * 0.011 * MOTION),
      cy0: H * 0.52 + H * 0.014 * Math.sin(t * 0.007 * MOTION + 1.7),
    };
    const diskR = 0.27 * minDim;

    this.drawStars(cam);

    const scaleA = prog === 0 ? 1 : Math.max(0, 1 - smooth(Math.min(1, prog / 0.55)));
    const scaleB = prog === 0 ? 0 : smooth(Math.max(0, (prog - 0.45) / 0.55));
    const skip = [A.key];
    if (scaleB > 0.004) skip.push(Bp.key);
    this.drawSystemDots(jd, cam, skip);

    const atA = this.drawGlobe(A, sysA, scaleA, cam, jd, diskR);
    let atB = null;
    if (sysB) atB = this.drawGlobe(Bp, sysB, scaleB, cam, jd, diskR);

    const mA = prog === 0 ? 1 : Math.max(0, (scaleA - 0.85) / 0.15);
    const mB = Math.max(0, (scaleB - 0.85) / 0.15);
    if (sysA.moons && atA && mA > 0) this.drawMoons(A, sysA, atA, mA, minDim);
    if (sysB && sysB.moons && atB && mB > 0) this.drawMoons(Bp, sysB, atB, mB, minDim);

    // ---- caption & title: the dials ----
    let cap, title;
    if (prog === 0) {
      const map = planetMaps.peek(A.key);
      const iso = new Date((jd - 2440587.5) * 86400000).toISOString();
      cap = `${iso.slice(0, 10)} ${iso.slice(11, 16)} UT · ${A.cmLabel || 'CM'} ` +
        `${String(Math.round(sysA.cm) % 360).padStart(3, '0')}° · 1 s = 2 min · ` +
        (map ? map.source : 'loading map');
      if (A.phase) cap += ` · phase ${Math.round(Math.acos(Math.max(-1, Math.min(1, sysA.sun[2]))) * 180 / Math.PI)}°`;
      if (A.rings) cap += ` · rings ${(Math.abs(sysA.De) * 180 / Math.PI).toFixed(1)}° open`;
      if (sysA.moons) cap += ' · moons: compressed radii';
      title = A.name;
    } else {
      const ha = sysA.h3, hb = sysB.h3;
      const dAB = Math.hypot(hb.x - ha.x, hb.y - ha.y, hb.z - ha.z);
      cap = `in transit · ${A.name} → ${Bp.name} · ${dAB.toFixed(2)} AU`;
      title = prog < 0.5 ? A.name : Bp.name;
    }
    if (cap !== this._cap) {
      this._cap = cap;
      if (scenes[current] === this) detailEl.textContent = cap;
    }
    if (title !== this._title) {
      this._title = title;
      this.title = title;
      if (scenes[current] === this) titleEl.textContent = title;
    }
  },

  /* build geom/shade for an upcoming planet without drawing it */
  drawGlobeWarm(p, sys, jd, diskR) {
    const map = planetMaps.peek(p.key);
    if (!map) return;
    const S = Math.min(840, Math.round(2 * diskR * Math.min(DPR, 2)));
    const g = this._globe(p.key);
    if (!g.geom || g.geom.S !== S || g.geom.tex !== map
        || g.geom.flat !== p.flat || Math.abs(g.geom.De - sys.De) > 0.005) {
      this.buildGeom(g, S, map, p, sys.De);
    }
    if (Math.abs(jd - g.shadeJd) > 0.1) {
      this.buildShade(g, sys.sun);
      if (p.rings) this.buildRings(g, sys.De, sys.Ds, p);
      g.shadeJd = jd;
    }
    this._repaint(g, p, sys.cm);
  },
};

/* ============================================================
   Scene manager — fade through black
   Two views, one deployment: the default ambient rotation of the
   three observatory scenes, and ?view=tour (also served at tour/)
   which dedicates the display to the planet grand tour.
   ============================================================ */
const scenes = CONFIG.view === 'tour'
  ? [planetView]
  : [orrery, localSky, cosmicWeb];
scenes.forEach(s => s.init());
window.addEventListener('resize', () => scenes.forEach(s => s.onResize?.()));

const captionEl = document.getElementById('caption');
const titleEl = captionEl.querySelector('.title');
const detailEl = captionEl.querySelector('.detail');

let current = CONFIG.scene !== null
  ? Math.min(Math.max(CONFIG.scene, 0), scenes.length - 1) : 0;
const sceneLocked = CONFIG.scene !== null || scenes.length === 1;
let phase = 'in';            // in → hold → out
let phaseStart = performance.now() / 1000;
let paused = false;
let sceneClock = 0;          // per-scene time (drives motion), pausable
let lastFrame = performance.now() / 1000;

function setCaption(i) {
  titleEl.textContent = scenes[i].title;
  detailEl.textContent = scenes[i].detail;
}
setCaption(current);
scenes[current].enter?.(sceneClock);
requestAnimationFrame(() => captionEl.classList.add('visible'));

function advance(dir) {
  current = (current + dir + scenes.length) % scenes.length;
  phase = 'in';
  phaseStart = performance.now() / 1000;
  sceneClock = rand(0, 500);      // desynchronize scene starting states
  scenes[current].enter?.(sceneClock);
  captionEl.classList.remove('visible');
  setCaption(current);
  setTimeout(() => captionEl.classList.add('visible'), 400);
  updateDots();
}

function envelope(now) {
  const el = now - phaseStart;
  if (phase === 'in') {
    if (el >= FADE) { phase = 'hold'; phaseStart = now; return 1; }
    return smooth(el / FADE);
  }
  if (phase === 'hold') {
    if (!paused && !sceneLocked && el >= SCENE_HOLD) { phase = 'out'; phaseStart = now; }
    return 1;
  }
  // out
  if (el >= FADE) { advance(1); return 0; }
  return 1 - smooth(el / FADE);
}

function frame() {
  const now = performance.now() / 1000;
  const dt = Math.min(now - lastFrame, 0.1);
  lastFrame = now;
  if (!paused) sceneClock += dt;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  const env = envelope(now);
  if (env > 0.003) {
    ctx.save();
    ctx.globalAlpha = env;
    scenes[current].draw(sceneClock);
    ctx.restore();
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ============================================================
   Controls
   ============================================================ */
const controlsEl = document.getElementById('controls');
const dotsEl = document.getElementById('dots');
const pauseBtn = document.getElementById('pause');

scenes.forEach((s, i) => {
  const d = document.createElement('button');
  d.className = 'dot';
  d.setAttribute('role', 'tab');
  d.setAttribute('aria-label', s.title);
  d.addEventListener('click', () => { current = i - 1; advance(1); });
  dotsEl.appendChild(d);
});
function updateDots() {
  [...dotsEl.children].forEach((d, i) => d.classList.toggle('active', i === current));
}
updateDots();

/* in the dedicated tour view, prev/next travel between planets with the
   same animated slew as the scheduled transits */
function nav(dir) {
  if (scenes.length === 1 && scenes[current].jump) scenes[current].jump(dir);
  else advance(dir);
}
document.getElementById('prev').addEventListener('click', () => nav(-1));
document.getElementById('next').addEventListener('click', () => nav(1));
pauseBtn.addEventListener('click', togglePause);

function togglePause() {
  paused = !paused;
  pauseBtn.textContent = paused ? '▶' : '❚❚';
  pauseBtn.setAttribute('aria-label', paused ? 'Play' : 'Pause');
}

let hideTimer = null;
function revealControls() {
  controlsEl.classList.add('visible');
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => controlsEl.classList.remove('visible'), 2600);
}
window.addEventListener('mousemove', revealControls);
window.addEventListener('touchstart', revealControls, { passive: true });

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') { nav(1); revealControls(); }
  else if (e.key === 'ArrowLeft') { nav(-1); revealControls(); }
  else if (e.key === ' ') { e.preventDefault(); togglePause(); revealControls(); }
});
</script>
</body>
</html>

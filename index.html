<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">
<title>Celestial Display</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap');

  :root {
    --ink-bright: #E8ECF2;
    --ink-mid:    #9AA3AD;
    --ink-dim:    #565E68;
    --ice:        #7FB4D9;
    --amber:      #C9A26B;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100%;
    background: #000;
    overflow: hidden;
    font-family: 'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace;
    cursor: default;
  }

  #stage { position: fixed; inset: 0; display: block; width: 100%; height: 100%; }

  /* ---------- caption ---------- */
  #caption {
    position: fixed;
    top: 28px; left: 32px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.6s ease;
  }
  #caption.visible { opacity: 1; }
  #caption .title {
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.28em;
    color: var(--ink-mid);
    text-transform: uppercase;
  }
  #caption .detail {
    margin-top: 7px;
    font-size: 9px;
    font-weight: 300;
    letter-spacing: 0.18em;
    color: var(--ink-dim);
    text-transform: uppercase;
  }

  /* ---------- controls (hover-revealed) ---------- */
  #controls {
    position: fixed;
    bottom: 26px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    align-items: center;
    gap: 18px;
    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
  }
  #controls.visible { opacity: 1; pointer-events: auto; }

  #controls button {
    background: none;
    border: 1px solid rgba(154,163,173,0.25);
    color: var(--ink-mid);
    font-family: inherit;
    font-size: 10px;
    letter-spacing: 0.1em;
    width: 30px; height: 30px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: border-color 0.25s, color 0.25s;
  }
  #controls button:hover { border-color: var(--ink-mid); color: var(--ink-bright); }
  #controls button:focus-visible {
    outline: 1px solid var(--ice);
    outline-offset: 2px;
  }

  #dots { display: flex; gap: 10px; align-items: center; }
  #dots .dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: rgba(154,163,173,0.3);
    transition: background 0.4s, transform 0.4s;
    cursor: pointer;
    border: none; padding: 0;
  }
  #dots .dot.active { background: var(--ink-bright); transform: scale(1.3); }
  #dots .dot:focus-visible { outline: 1px solid var(--ice); outline-offset: 3px; }

  @media (prefers-reduced-motion: reduce) {
    #caption { transition: opacity 0.3s ease; }
  }
</style>
</head>
<body>

<canvas id="stage" aria-label="Rotating astronomical visualization"></canvas>

<div id="caption" aria-live="polite">
  <div class="title"></div>
  <div class="detail"></div>
</div>

<div id="controls">
  <button id="prev" aria-label="Previous scene">‹</button>
  <div id="dots" role="tablist"></div>
  <button id="pause" aria-label="Pause">❚❚</button>
  <button id="next" aria-label="Next scene">›</button>
</div>

<script>
'use strict';

/* ============================================================
   Celestial Display — prototype
   Three scenes, crossfaded through black (OLED-friendly):
     1. Heliocentric — log-radial Keplerian orrery
     2. Stellar sphere — all-sky field w/ galactic band
     3. Large-scale structure — synthetic cosmic web
   ============================================================ */

const TAU = Math.PI * 2;
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const MOTION = reduceMotion ? 0.12 : 1.0;

/* ---------- device config via URL params ----------
   One deployment, many displays. Examples:
     ?hold=1800                 wall display: 30 min per scene
     ?density=0.6&labels=off    small tablet: lighter field, pure art
     ?scene=1                   lock to a single scene (0-indexed)
   --------------------------------------------------- */
const params = new URLSearchParams(location.search);
const num = (k, d) => { const v = parseFloat(params.get(k)); return Number.isFinite(v) ? v : d; };

// default particle density scales with pixel count (tablet ≈ 0.5–0.7, 4K wall ≈ 1.5+)
const autoDensity = Math.max(0.35, Math.min(2.0,
  (window.innerWidth * window.innerHeight) / (1920 * 1080)));

const CONFIG = {
  hold:    num('hold', 40),                 // seconds per scene
  fade:    num('fade', 2.6),                // crossfade duration
  density: num('density', autoDensity),     // particle-count multiplier
  labels:  params.get('labels') !== 'off',  // planet names + AU rings
  scene:   params.has('scene') ? Math.floor(num('scene', 0)) : null, // lock to one scene
};

const SCENE_HOLD = CONFIG.hold;
const FADE = CONFIG.fade;
const D = CONFIG.density;

const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * DPR; canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ---------- shared helpers ---------- */
const rand = (a, b) => a + Math.random() * (b - a);
function gauss() { // Box–Muller
  let u = 0, v = 0;
  while (u === 0) u = Math.random();
  while (v === 0) v = Math.random();
  return Math.sqrt(-2 * Math.log(u)) * Math.cos(TAU * v);
}
const smooth = t => t * t * (3 - 2 * t);

/* Solve Kepler's equation M = E − e·sinE (Newton) */
function keplerE(M, e) {
  let E = e < 0.8 ? M : Math.PI;
  for (let i = 0; i < 6; i++) {
    E -= (E - e * Math.sin(E) - M) / (1 - e * Math.cos(E));
  }
  return E;
}

/* ============================================================
   SCENE 1 — Heliocentric (log-radial orrery)
   ============================================================ */
const orrery = {
  title: 'Heliocentric',
  detail: 'Ephemeris · log-radial · 1 s = 1 day',

  // JPL Keplerian elements, mean ecliptic & equinox of J2000 (Standish).
  // Each element is [value at J2000, rate per Julian century].
  // Planets: Table 1 (valid 1800–2050 AD); Pluto: Table 2a, with its
  // extra b·T² term in mean anomaly. Ecliptic-plane projection (i, Ω
  // dropped): inclinations ≤ 7° except Pluto's 17°.
  // https://ssd.jpl.nasa.gov/planets/approx_pos.html
  planets: [
    { a: [ 0.38709927,  0.00000037], e: [0.20563593,  0.00001906], L: [ 252.25032350, 149472.67411175], w: [  77.45779628,  0.16047689], c: '#B8B2A8', s: 1.7, name: 'MERCURY' },
    { a: [ 0.72333566,  0.00000390], e: [0.00677672, -0.00004107], L: [ 181.97909950,  58517.81538729], w: [ 131.60246718,  0.00268329], c: '#E6D3A8', s: 2.4, name: 'VENUS'   },
    { a: [ 1.00000261,  0.00000562], e: [0.01671123, -0.00004392], L: [ 100.46457166,  35999.37244981], w: [ 102.93768193,  0.32327364], c: '#7FB4D9', s: 2.5, name: 'EARTH'   },
    { a: [ 1.52371034,  0.00001847], e: [0.09339410,  0.00007882], L: [  -4.55343205,  19140.30268499], w: [ -23.94362959,  0.44441088], c: '#D08159', s: 2.0, name: 'MARS'    },
    { a: [ 5.20288700, -0.00011607], e: [0.04838624, -0.00013253], L: [  34.39644051,   3034.74612775], w: [  14.72847983,  0.21252668], c: '#D9B48A', s: 4.4, name: 'JUPITER' },
    { a: [ 9.53667594, -0.00125060], e: [0.05386179, -0.00050991], L: [  49.95424423,   1222.49362201], w: [  92.59887831, -0.41897216], c: '#E3CFA0', s: 3.8, name: 'SATURN'  },
    { a: [19.18916464, -0.00196176], e: [0.04725744, -0.00004397], L: [ 313.23810451,    428.48202785], w: [ 170.95427630,  0.40805281], c: '#9FD4D9', s: 3.0, name: 'URANUS'  },
    { a: [30.06992276,  0.00026291], e: [0.00859048,  0.00005105], L: [ -55.12002969,    218.45945325], w: [  44.96476227, -0.32241464], c: '#6E93D6', s: 3.0, name: 'NEPTUNE' },
    { a: [39.48686035,  0.00449751], e: [0.24885238,  0.00006016], L: [ 238.96535011,    145.18042903], w: [ 224.09702598, -0.00968827], b: -0.01262724, c: '#8E8880', s: 1.5, name: 'PLUTO', dashed: true },
  ],

  EARTH_PERIOD_S: 365.25,   // 1 s of display time = 1 day (Earth orbits in ~6 min)
  R_MIN_AU: 0.28, R_MAX_AU: 52,
  belt: null, trojans: null,

  // The scene is a clock: each showing sweeps a real-time window centered
  // on "now" — half past, half future. enter() anchors display time to the
  // wall clock at scene entry; draw() maps scene seconds to Julian dates.
  tAnchor: 0, jdAnchor: 0, _iso: null,

  enter(tClock) {
    this.tAnchor = tClock;
    this.jdAnchor = Date.now() / 86400000 + 2440587.5;   // current JD (UTC)
    this._iso = null;
  },

  /* osculating elements at T Julian centuries from J2000 → mean anomaly etc. */
  elements(pl, T) {
    const a = pl.a[0] + pl.a[1] * T;
    const e = pl.e[0] + pl.e[1] * T;
    const L = pl.L[0] + pl.L[1] * T;
    const w = pl.w[0] + pl.w[1] * T;
    let M = (L - w + (pl.b ? pl.b * T * T : 0)) * Math.PI / 180;
    M = ((M % TAU) + TAU) % TAU;
    return { a, e, M, wRad: w * Math.PI / 180 };
  },

  init() {
    // --- main belt with Kirkwood gaps ---
    const gaps = [
      { a: 2.502, w: 0.048 },  // 3:1
      { a: 2.825, w: 0.032 },  // 5:2
      { a: 2.958, w: 0.026 },  // 7:3
      { a: 3.279, w: 0.042 },  // 2:1
    ];
    const belt = [];
    const beltCount = Math.round(1400 * D);
    while (belt.length < beltCount) {
      const a = rand(2.06, 3.30);
      if (gaps.some(g => Math.abs(a - g.a) < g.w)) continue;
      belt.push({
        a,
        phase: rand(0, TAU),
        n: TAU / (this.EARTH_PERIOD_S * Math.pow(a, 1.5)),  // Kepler III
        jitter: gauss() * 0.02,
        alpha: rand(0.10, 0.38),
      });
    }
    this.belt = belt;

    // --- Jupiter trojans (L4 / L5 clumps, co-orbital) ---
    const aJ = this.planets[4].a[0];
    const trojans = [];
    for (const sign of [1, -1]) {
      for (let i = 0; i < Math.round(130 * D); i++) {
        trojans.push({
          a: aJ * (1 + gauss() * 0.015),
          lead: sign * (Math.PI / 3 + gauss() * 0.16),
          alpha: rand(0.10, 0.32),
        });
      }
    }
    this.trojans = trojans;
  },

  Rmap(rAU, minDim) {
    const Rin = 0.055 * minDim, Rout = 0.465 * minDim;
    const f = Math.log(rAU / this.R_MIN_AU) / Math.log(this.R_MAX_AU / this.R_MIN_AU);
    return Rin + (Rout - Rin) * f;
  },

  draw(t) {
    const cx = W / 2, cy = H / 2, minDim = Math.min(W, H);
    const font = (px) => `${px}px 'IBM Plex Mono', monospace`;

    // display epoch: window of ±(hold/2) days centered on "now" at mid-hold
    const DAYS_PER_SEC = 365.25 / this.EARTH_PERIOD_S;
    const jd = this.jdAnchor
      + (t - this.tAnchor - (FADE + SCENE_HOLD / 2)) * DAYS_PER_SEC * MOTION;
    const T = (jd - 2451545.0) / 36525;   // Julian centuries from J2000

    // caption date readout — the clock hand
    const iso = new Date((jd - 2440587.5) * 86400000).toISOString().slice(0, 10);
    if (iso !== this._iso) {
      this._iso = iso;
      detailEl.textContent = `${iso} · log-radial · 1 s = 1 day`;
    }

    // --- AU reference rings ---
    if (CONFIG.labels) {
      ctx.save();
      ctx.setLineDash([1, 5]);
      ctx.lineWidth = 1;
      for (const au of [1, 10]) {
        const R = this.Rmap(au, minDim);
        ctx.strokeStyle = 'rgba(86,94,104,0.30)';
        ctx.beginPath(); ctx.arc(cx, cy, R, 0, TAU); ctx.stroke();
        ctx.fillStyle = 'rgba(86,94,104,0.65)';
        ctx.font = font(8.5);
        ctx.fillText(`${au} AU`, cx + R * 0.7071 + 6, cy - R * 0.7071 - 6);
      }
      ctx.restore();
    }

    // --- Sun ---
    let g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 30);
    g.addColorStop(0, 'rgba(255,244,224,0.95)');
    g.addColorStop(0.12, 'rgba(240,205,150,0.55)');
    g.addColorStop(0.5, 'rgba(201,162,107,0.10)');
    g.addColorStop(1, 'rgba(201,162,107,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, 30, 0, TAU); ctx.fill();

    // --- asteroid belt ---
    ctx.fillStyle = '#8B8578';
    for (const p of this.belt) {
      const th = p.phase + p.n * t * MOTION;
      const R = this.Rmap(p.a, minDim) + p.jitter * minDim;
      ctx.globalAlpha = p.alpha;
      ctx.fillRect(cx + R * Math.cos(th) - 0.5, cy - R * Math.sin(th) - 0.5, 1, 1);
    }

    // --- trojans (referenced to Jupiter's current mean longitude) ---
    const jup = this.planets[4];
    const Ljup = ((jup.L[0] + jup.L[1] * T) * Math.PI / 180) % TAU;
    ctx.fillStyle = '#9A8F7C';
    for (const p of this.trojans) {
      const th = Ljup + p.lead;
      const R = this.Rmap(p.a, minDim);
      ctx.globalAlpha = p.alpha;
      ctx.fillRect(cx + R * Math.cos(th) - 0.5, cy - R * Math.sin(th) - 0.5, 1, 1);
    }
    ctx.globalAlpha = 1;

    // --- orbits & planets ---
    for (const pl of this.planets) {
      const { a, e, M, wRad } = this.elements(pl, T);

      // orbit path: r(ν) = a(1−e²)/(1+e·cosν), log-mapped
      ctx.beginPath();
      const steps = 180;
      for (let s = 0; s <= steps; s++) {
        const nu = (s / steps) * TAU;
        const r = a * (1 - e * e) / (1 + e * Math.cos(nu));
        const R = this.Rmap(r, minDim);
        const th = nu + wRad;
        const x = cx + R * Math.cos(th), y = cy - R * Math.sin(th);
        s === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
      }
      ctx.lineWidth = 1;
      if (pl.dashed) ctx.setLineDash([2, 6]);
      ctx.strokeStyle = `rgba(127,180,217,${pl.dashed ? 0.10 : 0.17})`;
      ctx.stroke();
      ctx.setLineDash([]);

      // true position at the display epoch via Kepler's equation
      const E = keplerE(M, e);
      const nu = 2 * Math.atan2(
        Math.sqrt(1 + e) * Math.sin(E / 2),
        Math.sqrt(1 - e) * Math.cos(E / 2)
      );
      const r = a * (1 - e * Math.cos(E));
      const R = this.Rmap(r, minDim);
      const th = nu + wRad;
      const x = cx + R * Math.cos(th), y = cy - R * Math.sin(th);

      // glow + core
      g = ctx.createRadialGradient(x, y, 0, x, y, pl.s * 5);
      g.addColorStop(0, pl.c + 'AA');
      g.addColorStop(1, pl.c + '00');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(x, y, pl.s * 5, 0, TAU); ctx.fill();
      ctx.fillStyle = pl.c;
      ctx.beginPath(); ctx.arc(x, y, pl.s, 0, TAU); ctx.fill();

      // Saturn's ring hint
      if (pl.name === 'SATURN') {
        ctx.save();
        ctx.translate(x, y); ctx.rotate(-0.35);
        ctx.strokeStyle = pl.c + '66';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.ellipse(0, 0, pl.s * 2.4, pl.s * 0.9, 0, 0, TAU); ctx.stroke();
        ctx.restore();
      }

      // label
      if (CONFIG.labels) {
        ctx.fillStyle = 'rgba(154,163,173,0.42)';
        ctx.font = font(8.5);
        ctx.fillText(pl.name, x + pl.s + 6, y - pl.s - 4);
      }
    }
  },
};

/* ============================================================
   SCENE 2 — Stellar sphere (all-sky, galactic band)
   ============================================================ */
const starfield = {
  title: 'Stellar Sphere',
  detail: 'All-sky projection · synthetic field · swap in Gaia DR3',
  stars: null, nebulae: null,

  // --- Gaia DR3 (loaded async from data/gaia_stars.bin; synthetic above
  //     stays as the offline/file:// fallback) ---
  gaia: null,            // { bright: [...], faint: {ra,dec,alpha,bucket,order}, sprites }
  fieldTex: null, texW: 0, texH: 0,
  BRIGHT_CUT: 6.0,       // G < 6 drawn live w/ twinkle; fainter baked into texture
  DRIFT: 0.011,          // rad/s of sky rotation (× MOTION)

  /* BP−RP color index → approximate blackbody star color, slightly
     desaturated toward the display's star white. */
  bprpColor(c) {
    const stops = [
      [-0.5, [158, 178, 244]],   // O/B
      [ 0.1, [186, 202, 244]],
      [ 0.5, [225, 231, 242]],   // A/F — house star white
      [ 0.9, [242, 238, 220]],   // G
      [ 1.5, [240, 216, 176]],   // K
      [ 2.3, [232, 186, 138]],   // early M
      [ 3.4, [222, 158, 110]],   // M
    ];
    let i = 0;
    while (i < stops.length - 2 && c > stops[i + 1][0]) i++;
    const [c0, rgb0] = stops[i], [c1, rgb1] = stops[i + 1];
    const f = Math.max(0, Math.min(1, (c - c0) / (c1 - c0)));
    return rgb0.map((v, k) => Math.round(v + (rgb1[k] - v) * f));
  },

  async loadGaia() {
    try {
      const res = await fetch('data/gaia_stars.bin');
      if (!res.ok) return;
      const buf = await res.arrayBuffer();
      const dv = new DataView(buf);
      if (dv.getUint32(0, true) !== 0x47414941) return;   // "GAIA"
      const n = dv.getUint32(4, true);
      const u = new Uint16Array(buf, 8, n * 4);

      // galactic → ICRS rotation (transpose of the standard ICRS→galactic matrix)
      const R = [
        -0.0548755604,  0.4941094279, -0.8676661490,
        -0.8734370902, -0.4448296300, -0.1980763734,
        -0.4838350155,  0.7469822445,  0.4559837762,
      ];

      const NB = 24;                       // quantized color buckets
      const bucketRGB = [];
      for (let b = 0; b < NB; b++) {
        bucketRGB.push(this.bprpColor(-0.6 + (b + 0.5) * 4.6 / NB));
      }

      const bright = [];
      const fRa = new Float32Array(n), fDec = new Float32Array(n);
      const fAlpha = new Float32Array(n), fBucket = new Uint8Array(n);
      let nf = 0;
      for (let i = 0; i < n; i++) {
        const l   = u[i * 4]     / 65535 * TAU;
        const b   = u[i * 4 + 1] / 65535 * Math.PI - Math.PI / 2;
        const mag = u[i * 4 + 2] / 65535 * 14 - 2;          // [-2, 12]
        const col = u[i * 4 + 3] / 65535 * 4.6 - 0.6;       // [-0.6, 4.0]
        const cb = Math.cos(b);
        const xg = cb * Math.cos(l), yg = cb * Math.sin(l), zg = Math.sin(b);
        const x = R[0] * xg + R[1] * yg + R[2] * zg;
        const y = R[3] * xg + R[4] * yg + R[5] * zg;
        const z = R[6] * xg + R[7] * yg + R[8] * zg;
        const ra = Math.atan2(y, x), dec = Math.asin(Math.max(-1, Math.min(1, z)));
        const bucket = Math.max(0, Math.min(NB - 1, Math.floor((col + 0.6) / 4.6 * NB)));
        if (mag < this.BRIGHT_CUT) {
          bright.push({ ra, dec, m: mag, bk: bucket, tw: rand(0, TAU), tws: rand(0.3, 1.4) });
        } else {
          fRa[nf] = ra; fDec[nf] = dec; fBucket[nf] = bucket;
          fAlpha[nf] = Math.min(0.85, 1.9 * Math.pow(10, -0.4 * (mag - this.BRIGHT_CUT)));
          nf++;
        }
      }
      bright.sort((a, b) => a.m - b.m);

      // paint order grouped by color bucket (one fillStyle per bucket)
      const order = new Uint32Array(nf);
      for (let i = 0; i < nf; i++) order[i] = i;
      order.sort((a, b) => fBucket[a] - fBucket[b]);

      // pre-rendered glow sprites per bucket (no per-frame gradients)
      const sprites = bucketRGB.map(rgb => {
        const c = document.createElement('canvas');
        c.width = c.height = 64;
        const g2 = c.getContext('2d');
        const grad = g2.createRadialGradient(32, 32, 0, 32, 32, 32);
        grad.addColorStop(0, '#FFFFFF');
        grad.addColorStop(0.10, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.9)`);
        grad.addColorStop(0.32, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0.22)`);
        grad.addColorStop(1, `rgba(${rgb[0]},${rgb[1]},${rgb[2]},0)`);
        g2.fillStyle = grad;
        g2.fillRect(0, 0, 64, 64);
        return c;
      });

      this.gaia = { bright, nf, fRa, fDec, fAlpha, fBucket, order, bucketRGB, sprites };
      this.buildFieldTexture();
      this.detail = `Gaia DR3 · ${Math.round(n / 1000)}k stars · G < 10`;
      if (scenes[current] === this) setCaption(current);
    } catch (e) { console.warn('gaia load failed, synthetic fallback:', e); }
  },

  /* bake the faint field into an equirectangular texture at current W×H */
  buildFieldTexture() {
    const g = this.gaia;
    if (!g || !W || !H) return;
    const tex = this.fieldTex && this.texW === W && this.texH === H
      ? this.fieldTex : document.createElement('canvas');
    tex.width = W; tex.height = H;
    this.fieldTex = tex; this.texW = W; this.texH = H;
    const tc = tex.getContext('2d');
    tc.clearRect(0, 0, W, H);
    tc.globalCompositeOperation = 'lighter';   // real intensities accumulate
    let curBucket = -1;
    for (let k = 0; k < g.nf; k++) {
      const i = g.order[k];
      if (g.fBucket[i] !== curBucket) {
        curBucket = g.fBucket[i];
        const rgb = g.bucketRGB[curBucket];
        tc.fillStyle = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
      }
      const x = ((g.fRa[i] / TAU) % 1 + 1) % 1 * W;
      const y = (0.5 - g.fDec[i] / Math.PI) * H;
      tc.globalAlpha = g.fAlpha[i];
      tc.fillRect(x, y, 1, 1);
    }
    // bright stars beyond the live-draw budget are baked in as well,
    // so no star is silently dropped at low density
    g.liveCap = Math.min(g.bright.length, Math.round(7000 * D));
    for (let i = g.liveCap; i < g.bright.length; i++) {
      const s = g.bright[i];
      const rgb = g.bucketRGB[s.bk];
      tc.fillStyle = `rgb(${rgb[0]},${rgb[1]},${rgb[2]})`;
      const x = ((s.ra / TAU) % 1 + 1) % 1 * W;
      const y = (0.5 - s.dec / Math.PI) * H;
      tc.globalAlpha = 0.55;
      tc.fillRect(x - 1, y - 1, 2, 2);
    }
    tc.globalAlpha = 1;
    tc.globalCompositeOperation = 'source-over';
  },

  onResize() {
    clearTimeout(this._rsTimer);
    this._rsTimer = setTimeout(() => this.buildFieldTexture(), 300);
  },

  init() {
    this.loadGaia();   // async; falls back to synthetic below if unavailable
    const TILT = 1.05; // galactic-plane tilt vs. projection equator (rad)
    const toEq = (l, b) => {
      // point on sphere in "galactic" frame → rotate about x by TILT
      const x = Math.cos(b) * Math.cos(l);
      const y = Math.cos(b) * Math.sin(l);
      const z = Math.sin(b);
      const y2 = y * Math.cos(TILT) - z * Math.sin(TILT);
      const z2 = y * Math.sin(TILT) + z * Math.cos(TILT);
      return { ra: Math.atan2(y2, x), dec: Math.asin(Math.max(-1, Math.min(1, z2))) };
    };
    // star color by rough temperature class
    const colors = ['#AFC6E8', '#CBD8EC', '#E8ECF2', '#F2E8D5', '#EDD5A8', '#E0B080'];
    const pick = () => colors[Math.min(colors.length - 1, Math.floor(Math.pow(Math.random(), 0.7) * colors.length))];

    const stars = [];
    // uniform sky population
    for (let i = 0; i < Math.round(2600 * D); i++) {
      const l = rand(0, TAU), b = Math.asin(rand(-1, 1));
      const { ra, dec } = toEq(l, b);
      stars.push({ ra, dec, m: Math.pow(Math.random(), 2.6), c: pick(), tw: rand(0, TAU), tws: rand(0.3, 1.4) });
    }
    // galactic band concentration
    for (let i = 0; i < Math.round(3400 * D); i++) {
      const l = rand(0, TAU), b = gauss() * 0.13;
      const { ra, dec } = toEq(l, b);
      stars.push({ ra, dec, m: Math.pow(Math.random(), 2.2) * 0.8, c: pick(), tw: rand(0, TAU), tws: rand(0.3, 1.4) });
    }
    this.stars = stars;

    // faint nebulosity blobs along the band
    const neb = [];
    for (let i = 0; i < 130; i++) {
      const l = rand(0, TAU), b = gauss() * 0.09;
      const { ra, dec } = toEq(l, b);
      neb.push({ ra, dec, r: rand(30, 95), a: rand(0.015, 0.05) });
    }
    this.nebulae = neb;
  },

  project(ra, dec, t) {
    const drift = this.DRIFT * MOTION;
    let x = (((ra + t * drift) / TAU) % 1 + 1) % 1;
    const y = (0.5 - dec / Math.PI);
    return { x: x * W, y: y * H };
  },

  draw(t) {
    if (this.gaia) { this.drawGaia(t); return; }
    this.drawSynthetic(t);
  },

  drawGaia(t) {
    const g = this.gaia;
    if (!this.fieldTex || this.texW !== W || this.texH !== H) this.buildFieldTexture();

    // faint field: one baked texture, blitted twice for horizontal wrap
    const dx = ((t * this.DRIFT * MOTION / TAU) % 1 + 1) % 1 * W;
    ctx.drawImage(this.fieldTex, dx - W, 0);
    ctx.drawImage(this.fieldTex, dx, 0);

    // bright stars, live w/ twinkle, brightest first (density-capped;
    // the remainder is baked into the field texture)
    const count = g.liveCap;
    for (let i = 0; i < count; i++) {
      const s = g.bright[i];
      const p = this.project(s.ra, s.dec, t);
      const twinkle = reduceMotion ? 1 : 0.86 + 0.14 * Math.sin(t * s.tws + s.tw);
      const size = 0.8 + (this.BRIGHT_CUT - s.m) * 0.45;    // Sirius ≈ 4.2
      const glowR = size * 4;
      ctx.globalAlpha = Math.min(1, 0.30 + (this.BRIGHT_CUT - s.m) * 0.13) * twinkle;
      const spr = g.sprites[s.bk];
      ctx.drawImage(spr, p.x - glowR, p.y - glowR, glowR * 2, glowR * 2);
      if (p.x < glowR) ctx.drawImage(spr, p.x + W - glowR, p.y - glowR, glowR * 2, glowR * 2);
      else if (p.x > W - glowR) ctx.drawImage(spr, p.x - W - glowR, p.y - glowR, glowR * 2, glowR * 2);
    }
    ctx.globalAlpha = 1;
  },

  drawSynthetic(t) {
    // nebulosity first
    for (const n of this.nebulae) {
      const p = this.project(n.ra, n.dec, t);
      const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, n.r);
      g.addColorStop(0, `rgba(127,160,200,${n.a})`);
      g.addColorStop(1, 'rgba(127,160,200,0)');
      ctx.fillStyle = g;
      ctx.beginPath(); ctx.arc(p.x, p.y, n.r, 0, TAU); ctx.fill();
      // handle horizontal wrap for wide blobs
      if (p.x < n.r) { ctx.beginPath(); ctx.arc(p.x + W, p.y, n.r, 0, TAU); ctx.fill(); }
      if (p.x > W - n.r) { ctx.beginPath(); ctx.arc(p.x - W, p.y, n.r, 0, TAU); ctx.fill(); }
    }
    // stars
    for (const s of this.stars) {
      const p = this.project(s.ra, s.dec, t);
      const twinkle = reduceMotion ? 1 : 0.82 + 0.18 * Math.sin(t * s.tws + s.tw);
      const size = 0.4 + s.m * 1.9;
      ctx.globalAlpha = (0.25 + s.m * 0.75) * twinkle;
      ctx.fillStyle = s.c;
      if (size > 1.4) {
        ctx.beginPath(); ctx.arc(p.x, p.y, size * 0.62, 0, TAU); ctx.fill();
      } else {
        ctx.fillRect(p.x, p.y, size, size);
      }
    }
    ctx.globalAlpha = 1;
  },
};

/* ============================================================
   SCENE 3 — Large-scale structure (synthetic cosmic web)
   ============================================================ */
const cosmicWeb = {
  title: 'Large-Scale Structure',
  detail: 'Synthetic cosmic web · nodes, filaments, voids',
  pts: null,

  /* --- SDSS DR18 redshift fan (loaded async from data/sdss_galaxies.bin;
         synthetic web below stays as the offline fallback) ---
     Real spectroscopic galaxies plotted survey-style: RA → angle,
     comoving distance → radius, one declination slice at a time,
     slowly precessing through slices. */
  sdss: null,
  Z_MAX: 0.25,           // must match scripts/sdss_preprocess.py
  RA_CENTER: 190,        // northern contiguous footprint points "up"
  SLICE_HOLD: 36,        // seconds per declination slice
  SLICE_FADE: 5,         // crossfade between slices
  _texA: null, _texB: null,

  /* comoving distance LUT, flat ΛCDM (H0 = 70, Ωm = 0.3), normalized
     to D_C(Z_MAX); the raw stored quantity is the measured redshift */
  buildDcLUT() {
    const N = 256, SUB = 4, lut = new Float32Array(N + 1);
    const dz = this.Z_MAX / (N * SUB);
    let acc = 0;
    for (let i = 1; i <= N; i++) {
      for (let k = 0; k < SUB; k++) {
        const z = ((i - 1) * SUB + k + 0.5) * dz;
        acc += dz / Math.sqrt(0.3 * (1 + z) ** 3 + 0.7);
      }
      lut[i] = acc;
    }
    for (let i = 0; i <= N; i++) lut[i] /= lut[N];
    return lut;
  },

  async loadSDSS() {
    try {
      const res = await fetch('data/sdss_galaxies.bin');
      if (!res.ok) return;
      const buf = await res.arrayBuffer();
      const dv = new DataView(buf);
      if (dv.getUint32(0, true) !== 0x53445353) return;   // "SDSS"
      const n = dv.getUint32(4, true);
      const u = new Uint16Array(buf, 8, n * 3);

      const lut = this.buildDcLUT(), NL = 256;
      const th = new Float32Array(n), r = new Float32Array(n);
      const sliceOf = new Uint8Array(n).fill(255);
      const counts = new Uint32Array(20);
      for (let i = 0; i < n; i++) {
        const ra = u[i * 3] / 65535 * 360;
        const dec = u[i * 3 + 1] / 65535 * 180 - 90;
        const zf = u[i * 3 + 2] / 65535;                  // z / Z_MAX
        const dth = ((ra - this.RA_CENTER + 540) % 360) - 180;
        th[i] = dth * Math.PI / 180;
        const fi = zf * NL, i0 = Math.min(NL - 1, Math.floor(fi));
        r[i] = lut[i0] + (lut[i0 + 1] - lut[i0]) * (fi - i0);
        // 4°-wide declination bins centered at −2, 2, 6, … 74
        const k = Math.floor((dec + 4) / 4);
        if (k >= 0 && k < 20 && Math.abs(th[i]) < 1.75) {
          sliceOf[i] = k; counts[k]++;
        }
      }
      const order = [];
      for (let k = 0; k < 20; k++) if (counts[k] > 6000) order.push(k);
      if (!order.length) return;

      this.sdss = { n, th, r, sliceOf, counts, order };
      this._texA = this._texB = null;
    } catch (e) { console.warn('sdss load failed, synthetic fallback:', e); }
  },

  onResize() { this._texA = this._texB = null; },

  /* bake one declination slice — plot plus reference arcs — into a canvas */
  bakeSlice(k) {
    const s = this.sdss;
    const c = document.createElement('canvas');
    c.width = W; c.height = H;
    const g2 = c.getContext('2d');
    const cx = W / 2, cy = H * 0.88, Rmax = Math.min(H * 0.80, W * 0.52);

    // reference arcs at even redshifts (same grammar as the orrery's AU rings)
    if (CONFIG.labels) {
      const lut = this._lut || (this._lut = this.buildDcLUT());
      g2.save();
      g2.setLineDash([1, 5]);
      g2.lineWidth = 1;
      g2.strokeStyle = 'rgba(86,94,104,0.30)';
      g2.fillStyle = 'rgba(86,94,104,0.65)';
      g2.font = "8.5px 'IBM Plex Mono', monospace";
      for (const z of [0.05, 0.10, 0.15, 0.20, 0.25]) {
        const fi = z / this.Z_MAX * 256, i0 = Math.min(255, Math.floor(fi));
        const R = (lut[i0] + (lut[i0 + 1] - lut[i0]) * (fi - i0)) * Rmax;
        g2.beginPath();
        g2.arc(cx, cy, R, -Math.PI / 2 - 1.48, -Math.PI / 2 + 1.48);
        g2.stroke();
        g2.fillText(`z = ${z.toFixed(2)}`, cx + 5, cy - R - 4);
      }
      g2.restore();
    }

    g2.fillStyle = '#AFC9DE';
    g2.globalAlpha = 0.5;
    for (let i = 0; i < s.n; i++) {
      if (s.sliceOf[i] !== k) continue;
      const R = s.r[i] * Rmax, a = s.th[i];
      g2.fillRect(cx + R * Math.sin(a) - 0.5, cy - R * Math.cos(a) - 0.5, 1, 1);
    }
    g2.globalAlpha = 1;
    return { k, canvas: c };
  },

  sliceAt(idx) { return this.sdss.order[((idx % this.sdss.order.length) + this.sdss.order.length) % this.sdss.order.length]; },

  drawFan(t) {
    const s = this.sdss;
    const idx = Math.floor(t / this.SLICE_HOLD);
    const kCur = this.sliceAt(idx);
    if (!this._texA || this._texA.k !== kCur || this._texA.canvas.width !== W || this._texA.canvas.height !== H) {
      this._texA = this._texB && this._texB.k === kCur
        && this._texB.canvas.width === W && this._texB.canvas.height === H
        ? this._texB : this.bakeSlice(kCur);
      this._texB = null;
      const dec = kCur * 4 - 2;
      this.detail = `SDSS DR18 · ${Math.round(s.counts[kCur] / 1000)}k galaxies · δ ${dec >= 0 ? '+' : '−'}${Math.abs(dec)}° ± 2° · z < ${this.Z_MAX}`;
      if (scenes[current] === this) setCaption(current);
    }

    const phase = t - idx * this.SLICE_HOLD;
    const fadeF = Math.max(0, (phase - (this.SLICE_HOLD - this.SLICE_FADE)) / this.SLICE_FADE);
    if (fadeF > 0 && !this._texB) this._texB = this.bakeSlice(this.sliceAt(idx + 1));

    const cx = W / 2, cy = H * 0.88;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(0.05 * Math.sin(t * 0.013 * MOTION));   // slow instrument sway
    ctx.translate(-cx, -cy);
    ctx.globalAlpha = 1 - smooth(fadeF);
    ctx.drawImage(this._texA.canvas, 0, 0);
    if (fadeF > 0) {
      ctx.globalAlpha = smooth(fadeF);
      ctx.drawImage(this._texB.canvas, 0, 0);
    }
    ctx.restore();
    ctx.globalAlpha = 1;
  },

  init() {
    this.loadSDSS();   // async; falls back to synthetic web below
    // halo nodes
    const nodes = [];
    for (let i = 0; i < Math.round(110 * Math.sqrt(D)); i++) {
      nodes.push({ x: rand(-1, 1), y: rand(-1, 1), z: rand(-1, 1), mass: Math.pow(Math.random(), 1.6) });
    }
    const pts = [];
    // cluster cores
    for (const nd of nodes) {
      const count = 8 + Math.floor(nd.mass * 42);
      const sigma = 0.018 + nd.mass * 0.03;
      for (let i = 0; i < count; i++) {
        pts.push({
          x: nd.x + gauss() * sigma, y: nd.y + gauss() * sigma, z: nd.z + gauss() * sigma,
          warm: nd.mass > 0.72, a: rand(0.25, 0.85),
        });
      }
    }
    // filaments: each node → its 2 nearest neighbors
    for (const nd of nodes) {
      const nbrs = nodes
        .filter(o => o !== nd)
        .map(o => ({ o, d: (o.x - nd.x) ** 2 + (o.y - nd.y) ** 2 + (o.z - nd.z) ** 2 }))
        .sort((a, b) => a.d - b.d)
        .slice(0, 2);
      for (const { o } of nbrs) {
        const segs = 26;
        for (let i = 0; i < segs; i++) {
          const f = (i + Math.random()) / segs;
          const spread = 0.014 * Math.sin(f * Math.PI) * 3; // fatter mid-filament
          pts.push({
            x: nd.x + (o.x - nd.x) * f + gauss() * spread,
            y: nd.y + (o.y - nd.y) * f + gauss() * spread,
            z: nd.z + (o.z - nd.z) * f + gauss() * spread,
            warm: false, a: rand(0.08, 0.4),
          });
        }
      }
    }
    this.pts = pts;
  },

  draw(t) {
    if (this.sdss) { this.drawFan(t); return; }
    this.drawSynthetic(t);
  },

  drawSynthetic(t) {
    const cx = W / 2, cy = H / 2;
    const scale = Math.min(W, H) * 0.44;
    const yaw = t * 0.055 * MOTION, pitch = 0.42 + 0.07 * Math.sin(t * 0.021 * MOTION);
    const cyw = Math.cos(yaw), syw = Math.sin(yaw);
    const cpt = Math.cos(pitch), spt = Math.sin(pitch);
    const CAM = 3.1;

    for (const p of this.pts) {
      // rotate: yaw about y, pitch about x
      const x1 = p.x * cyw + p.z * syw;
      const z1 = -p.x * syw + p.z * cyw;
      const y2 = p.y * cpt - z1 * spt;
      const z2 = p.y * spt + z1 * cpt;

      const persp = CAM / (CAM + z2);
      const sx = cx + x1 * scale * persp;
      const sy = cy + y2 * scale * persp;

      const depth = Math.max(0, Math.min(1, (1.4 - z2) / 2.8));
      ctx.globalAlpha = p.a * (0.25 + 0.75 * depth);
      ctx.fillStyle = p.warm ? '#C9A26B' : '#9FC3DE';
      const s = (p.warm ? 1.7 : 1.05) * persp;
      ctx.fillRect(sx - s / 2, sy - s / 2, s, s);
    }
    ctx.globalAlpha = 1;
  },
};

/* ============================================================
   Scene manager — fade through black
   ============================================================ */
const scenes = [orrery, starfield, cosmicWeb];
scenes.forEach(s => s.init());
window.addEventListener('resize', () => scenes.forEach(s => s.onResize?.()));

const captionEl = document.getElementById('caption');
const titleEl = captionEl.querySelector('.title');
const detailEl = captionEl.querySelector('.detail');

let current = CONFIG.scene !== null
  ? Math.min(Math.max(CONFIG.scene, 0), scenes.length - 1) : 0;
const sceneLocked = CONFIG.scene !== null;
let phase = 'in';            // in → hold → out
let phaseStart = performance.now() / 1000;
let paused = false;
let sceneClock = 0;          // per-scene time (drives motion), pausable
let lastFrame = performance.now() / 1000;

function setCaption(i) {
  titleEl.textContent = scenes[i].title;
  detailEl.textContent = scenes[i].detail;
}
setCaption(current);
scenes[current].enter?.(sceneClock);
requestAnimationFrame(() => captionEl.classList.add('visible'));

function advance(dir) {
  current = (current + dir + scenes.length) % scenes.length;
  phase = 'in';
  phaseStart = performance.now() / 1000;
  sceneClock = rand(0, 500);      // desynchronize scene starting states
  scenes[current].enter?.(sceneClock);
  captionEl.classList.remove('visible');
  setCaption(current);
  setTimeout(() => captionEl.classList.add('visible'), 400);
  updateDots();
}

function envelope(now) {
  const el = now - phaseStart;
  if (phase === 'in') {
    if (el >= FADE) { phase = 'hold'; phaseStart = now; return 1; }
    return smooth(el / FADE);
  }
  if (phase === 'hold') {
    if (!paused && !sceneLocked && el >= SCENE_HOLD) { phase = 'out'; phaseStart = now; }
    return 1;
  }
  // out
  if (el >= FADE) { advance(1); return 0; }
  return 1 - smooth(el / FADE);
}

function frame() {
  const now = performance.now() / 1000;
  const dt = Math.min(now - lastFrame, 0.1);
  lastFrame = now;
  if (!paused) sceneClock += dt;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  const env = envelope(now);
  if (env > 0.003) {
    ctx.save();
    ctx.globalAlpha = env;
    scenes[current].draw(sceneClock);
    ctx.restore();
  }
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

/* ============================================================
   Controls
   ============================================================ */
const controlsEl = document.getElementById('controls');
const dotsEl = document.getElementById('dots');
const pauseBtn = document.getElementById('pause');

scenes.forEach((s, i) => {
  const d = document.createElement('button');
  d.className = 'dot';
  d.setAttribute('role', 'tab');
  d.setAttribute('aria-label', s.title);
  d.addEventListener('click', () => { current = i - 1; advance(1); });
  dotsEl.appendChild(d);
});
function updateDots() {
  [...dotsEl.children].forEach((d, i) => d.classList.toggle('active', i === current));
}
updateDots();

document.getElementById('prev').addEventListener('click', () => advance(-1));
document.getElementById('next').addEventListener('click', () => advance(1));
pauseBtn.addEventListener('click', togglePause);

function togglePause() {
  paused = !paused;
  pauseBtn.textContent = paused ? '▶' : '❚❚';
  pauseBtn.setAttribute('aria-label', paused ? 'Play' : 'Pause');
}

let hideTimer = null;
function revealControls() {
  controlsEl.classList.add('visible');
  clearTimeout(hideTimer);
  hideTimer = setTimeout(() => controlsEl.classList.remove('visible'), 2600);
}
window.addEventListener('mousemove', revealControls);
window.addEventListener('touchstart', revealControls, { passive: true });

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') { advance(1); revealControls(); }
  else if (e.key === 'ArrowLeft') { advance(-1); revealControls(); }
  else if (e.key === ' ') { e.preventDefault(); togglePause(); revealControls(); }
});
</script>
